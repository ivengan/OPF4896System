<!DOCTYPE html>
<html>
<head>
    <title>Firestore Debugger v2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <h1>Firestore Data Check v2</h1>
    <div id="output">Loading...</div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQAKliT1QN8H-FOuNzvUGArbyQfM_U5MA",
            authDomain: "opf4896system.firebaseapp.com",
            projectId: "opf4896system",
            storageBucket: "opf4896system.appspot.com",
            messagingSenderId: "150864121707",
            appId: "1:150864121707:web:b3161a86514c1d86dd062e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function check() {
            let html = "";
            try {
                const pendingOrders = await db.collection('orders').where('status', '==', 'pending').get();
                html += `<h2>Orders Status</h2>`;
                html += `<p>Total Pending Orders: ${pendingOrders.size}</p>`;
                
                let invoicedCount = 0;
                pendingOrders.forEach(doc => {
                    const data = doc.data();
                    let hasInvoiced = false;
                    if (data.broilers) data.broilers.forEach(b => { if(b.isInvoiced) hasInvoiced = true; });
                    if (data.parts) data.parts.forEach(p => { if(p.isInvoiced) hasInvoiced = true; });
                    if (hasInvoiced) invoicedCount++;
                });
                html += `<p>Pending Orders with AT LEAST ONE Invoiced Item: ${invoicedCount}</p>`;

                const deliveryOrders = await db.collection('delivery_orders').get();
                html += `<h2>Delivery Orders Collection</h2>`;
                html += `<p>Total Delivery Orders found: ${deliveryOrders.size}</p>`;
                
                // Check if collection name is different?
                const collections = ['delivery_order', 'invoices', 'trips', 'delivery_history'];
                for(let c of collections) {
                    const snap = await db.collection(c).get();
                    html += `<p>Collection '${c}' count: ${snap.size}</p>`;
                }

            } catch (e) {
                html += `<p style="color:red">Error: ${e.message}</p>`;
            }
            document.getElementById('output').innerHTML = html;
        }
        check();
    </script>
</body>
</html>
