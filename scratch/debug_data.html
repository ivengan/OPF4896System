<!DOCTYPE html>
<html>
<head>
    <title>Firestore Debugger</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <h1>Firestore Data Check</h1>
    <div id="output">Loading...</div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQAKliT1QN8H-FOuNzvUGArbyQfM_U5MA",
            authDomain: "opf4896system.firebaseapp.com",
            projectId: "opf4896system",
            storageBucket: "opf4896system.appspot.com",
            messagingSenderId: "150864121707",
            appId: "1:150864121707:web:b3161a86514c1d86dd062e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function check() {
            let html = "";
            try {
                const orders = await db.collection('orders').limit(10).get();
                html += "<h2>Orders (Limit 10)</h2><ul>";
                orders.forEach(doc => {
                    html += `<li>ID: ${doc.id}, Status: ${doc.data().status}, DeliveryStatus: ${doc.data().deliveryStatus}</li>`;
                });
                html += "</ul>";

                const pendingOrders = await db.collection('orders').where('status', '==', 'pending').get();
                html += `<p>Total Pending Orders: ${pendingOrders.size}</p>`;

                const deliveryOrders = await db.collection('delivery_orders').limit(10).get();
                html += "<h2>Delivery Orders (Limit 10)</h2><ul>";
                deliveryOrders.forEach(doc => {
                    html += `<li>ID: ${doc.id}, Customer: ${doc.data().customerName}, Date: ${doc.data().timestamp ? doc.data().timestamp.toDate() : 'N/A'}</li>`;
                });
                html += "</ul>";
                
                const customers = await db.collection('customers').limit(5).get();
                html += "<h2>Customers (Limit 5)</h2><ul>";
                customers.forEach(doc => {
                    html += `<li>${doc.data().displayName}</li>`;
                });
                html += "</ul>";

            } catch (e) {
                html += `<p style="color:red">Error: ${e.message}</p>`;
            }
            document.getElementById('output').innerHTML = html;
        }
        check();
    </script>
</body>
</html>
