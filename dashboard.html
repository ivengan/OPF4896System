<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Multi-Function System</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png">
    <style>
        :root {
            --bg-app: #f4f4f5;
            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --text-main: #18181b;
            --text-muted: #52525b;
            --primary: #27272a;
            --primary-hover: #3f3f46;
            --danger: #991b1b;
            --danger-muted: #fef2f2;
            --border: #e4e4e7;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        *, ::after, ::before { box-sizing: border-box; }
        html { line-height: 1.5; -webkit-text-size-adjust: 100%; }
        body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: var(--bg-app); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        button { cursor: pointer; appearance: none; transition: all 0.2s ease; }
        a { text-decoration: none; }

        .header { 
            background: var(--bg-header); 
            padding: 0.75rem 1.25rem; 
            box-shadow: var(--shadow);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 10;
        }
        
        .title { font-size: 1.1rem; font-weight: 800; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.05em; }
        
        .header-actions { display: flex; gap: 0.75rem; align-items: center; }

        .nav-btn {
            background: var(--primary); 
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .nav-btn:hover { background: var(--primary-hover); }

        .logout-btn { 
            background: transparent; 
            color: var(--danger); 
            border: 1px solid var(--danger);
            padding: 0.4rem 0.8rem; 
            border-radius: 0.375rem; 
            font-weight: 700; 
            font-size: 0.8rem; 
        }
        .logout-btn:hover { background: var(--danger-muted); }
        
        .main-container { 
            flex: 1; 
            padding: 1.5rem; 
            max-width: 32rem; 
            margin: 0 auto; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }

        .menu-btn { 
            display: flex; 
            align-items: center; 
            padding: 1.25rem; 
            border-radius: 0.75rem; 
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main); 
            font-weight: 700; 
            font-size: 1rem; 
            box-shadow: var(--shadow);
            text-decoration: none; 
            width: 100%;
        }
        .menu-btn:active { transform: scale(0.98); background: var(--bg-app); }
        .menu-btn span { margin-left: 1rem; flex: 1; }
        .menu-btn svg { width: 1.5rem; height: 1.5rem; flex-shrink: 0; color: var(--text-muted); }

        /* Modernized Menu Buttons (Monochromatic) */
        .btn-order, .btn-stock, .btn-broiler, .btn-parts, .btn-lembik, .btn-do, .btn-chiller {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
        }
        .btn-order:hover, .btn-stock:hover, .btn-broiler:hover, .btn-parts:hover, .btn-lembik:hover, .btn-do:hover, .btn-chiller:hover {
            border-color: var(--primary);
        }

        /* Modal Styles */
        .hidden { display: none !important; }
        .fixed { position: fixed; }
        .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
        .z-50 { z-index: 50; }
        .bg-opacity-50 { background-color: rgba(9, 9, 11, 0.5); backdrop-filter: blur(4px); }
        .modal-bg { background-color: var(--bg-card); border-radius: 1rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border: 1px solid var(--border); }
        .p-6 { padding: 1.5rem; }
        .text-center { text-align: center; }
        .justify-center { justify-content: center; }
        .items-center { align-items: center; }
        
        .modal-link {
            display: block;
            width: 100%;
            text-align: center;
            padding: 1rem;
            border-radius: 0.5rem;
            color: white;
            background: var(--primary);
            font-weight: 700;
            text-decoration: none;
            margin-bottom: 0.5rem;
        }
        .modal-link:hover { background: var(--primary-hover); }
        
        .flex-col { flex-direction: column; }
        .justify-center { justify-content: center; }
        .items-center { align-items: center; }
        .text-gray-800 { color: #1f293d; }
        .text-xl { font-size: 1.25rem; font-weight: 700; }
        .mt-4 { margin-top: 1rem; }
        .space-y-4 > * + * { margin-top: 1rem; }
        .text-gray-500 { color: #6b7281; }
        
        .modal-link {
            display: block;
            width: 100%;
            text-align: center;
            padding: 0.75rem;
            border-radius: 0.75rem;
            color: white;
            font-weight: 700;
            font-size: 1.125rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .bg-cyan-500 { background-color: #06b6d4; }
        .bg-blue-500 { background-color: #3b82f6; }
        
            .whitespace-nowrap { white-space: nowrap; }
        .inline-flex { display: inline-flex; }
        .min-h-16 { min-height: 4rem; }
            .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
    </style>
</head>
<body>


    <script>
        const loginExpiry = localStorage.getItem('loginExpiry');
        if (!loginExpiry || Date.now() >= parseInt(loginExpiry)) {
            localStorage.removeItem('loginExpiry');
            window.location.href = 'index.html';
        }
    </script>

    <div class="header" style="position: relative;">
        <div class="title">Main Menu</div>
        <div id="header-today-date" class="text-gray-800" style="position: absolute; left: 50%; transform: translateX(-50%); font-size: 1.1rem; font-weight: 800;"></div>
        <div class="header-actions">
            <button class="nav-btn" onclick="window.location.href='dashboard2.html'">TO ADMIN PANEL</button>
            <button id="logout-btn" class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main-container">
        <div class="menu-grid">
            
            <a href="order.html" class="menu-btn btn-order">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span>Submit Order</span>
                <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="broiler_dsptch.html" class="menu-btn btn-broiler">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span>Broiler Dispatch</span>
                <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="parts_dsptch.html" class="menu-btn btn-parts">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <span>Parts Dispatch</span>
                <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="parts_lembik.html" class="menu-btn btn-lembik">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <span>Parts Dispatch (Lembik)</span>
                <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="d_o.html" class="menu-btn btn-do">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span>Delivery Orders (D/O)</span>
                <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="stock_in.html" class="menu-btn btn-stock">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span>Stock In</span>
                <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <button onclick="openStockModal()" class="menu-btn btn-chiller">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span>Chiller/ Freezer Stocks</span>
                <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>

        </div>
    </div>

    <div id="stock-modal" class="hidden fixed inset-0 z-50 bg-opacity-50 flex items-center justify-center p-4" onclick="handleModalClick(event)">
        <div class="modal-bg w-full max-w-sm p-6 space-y-4">
            <h2 class="text-xl">Select Stock Type</h2>
            
            <div class="flex flex-col gap-3">
                <a href="chiller_stck.html" class="modal-link">
                    Chiller Stock
                </a>
                <a href="freezer_stck.html" class="modal-link">
                    Freezer Stock
                </a>
            </div>

            <button onclick="closeStockModal()" class="w-full mt-4 text-gray-500 font-semibold py-2">Cancel</button>
        </div>
    </div>

    <script>
        function openStockModal() {
            document.getElementById('stock-modal').classList.remove('hidden');
        }

        function closeStockModal() {
            document.getElementById('stock-modal').classList.add('hidden');
        }

        function handleModalClick(event) {
            const modal = document.getElementById('stock-modal');
            if (event.target === modal) {
                closeStockModal();
            }
        }

        function logout() {
            localStorage.removeItem('loginExpiry');
            window.location.href = 'index.html';
        }
        function updateHeaderDate() {
            const dateEl = document.getElementById('header-today-date');
            if (dateEl) {
                const now = new Date();
                const d = String(now.getDate()).padStart(2, '0');
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const y = now.getFullYear();
                dateEl.textContent = `${d}/${m}/${y}`;
            }
        }
        document.addEventListener('DOMContentLoaded', updateHeaderDate);
    </script>
</body>
</html>
