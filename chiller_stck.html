        const loginExpiry = localStorage.getItem('loginExpiry');
        if (!loginExpiry || Date.now() >= parseInt(loginExpiry)) {
            localStorage.removeItem('loginExpiry');
            window.location.href = 'index.html';

    <header class="bg-white shadow-md sticky top-0 z-20">

             </div>
         </div>

    <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <div id="notification-area" class="mb-4 fixed top-20 right-4 z-50"></div>
        
        <div class="mb-4 flex justify-between items-center">
            <h2 class="text-xl font-bold text-gray-900 tracking-tight">Daily Stock Records</h2>
            <span class="text-[17px] font-semibold text-blue-600 bg-blue-100 px-3 py-1 rounded-full" id="date-display"></span>
        </div>

        <div id="stock-list" class="space-y-4">
            <p class="p-4 text-center text-gray-500">Loading stock data...</p>
        </div>
    </main>

    <div id="edit-modal" class="hidden fixed inset-0 z-50 bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 class="text-xl font-bold text-gray-900 tracking-tight">Edit Stock Entry</h2>
                <button id="edit-close-x" class="text-gray-500 hover:text-gray-700 font-bold text-2xl px-2">&times;</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[17px] font-bold text-gray-700">1. Weight (Gross KG)</label>
                    <input type="number" step="0.01" id="edit-weight" class="w-full border border-gray-300 rounded-lg p-3 mt-1" placeholder="0.0">
                </div>
                
                <div>
                    <label class="block text-[17px] font-bold text-gray-700">2. Broiler type</label>
                    <select id="edit-category" class="w-full border border-gray-300 rounded-lg p-3 mt-1">
                        <option value="H/P">1. H/P</option>
                        <option value="Kopek">2. KOPEK</option>
                        <option value="Slices">3. SLICES</option>
                        <option value="Remark">4. REMARK</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[17px] font-bold text-gray-700">3. Stock in number (Qty)</label>
                    <input type="number" id="edit-qty" class="w-full border border-gray-300 rounded-lg p-3 mt-1" placeholder="e.g. 50">
                </div>

                <div>
                    <label class="block text-[17px] font-bold text-gray-700">4. Container type</label>
                    <select id="edit-container" class="w-full border border-gray-300 rounded-lg p-3 mt-1">
                        <option value="Crate">Crate</option>
                        <option value="Basket">Basket</option>
                        <option value="Barrel">Barrel</option>
                        <option value="None">None</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-3 pt-4">
                <button id="edit-clear-btn" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded-xl transition shadow-md">Clear</button>
                <button id="edit-confirm-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition shadow-md">Confirm & Update</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQAKliT1QN8H-FOuNzvUGArbyQfM_U5MA",
            authDomain: "opf4896system.firebaseapp.com",
            projectId: "opf4896system",
            storageBucket: "opf4896system.appspot.com",
            messagingSenderId: "150864121707",
            appId: "1:150864121707:web:b3161a86514c1d86dd062e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Format Date Logic
        const tDate = new Date();
        const dd = String(tDate.getDate()).padStart(2, '0');
        const mm = String(tDate.getMonth() + 1).padStart(2, '0');
        const yyyy = tDate.getFullYear();
        const formattedToday = `${dd}/${mm}/${yyyy}`;

        const stockListDiv = document.getElementById('stock-list');
        const notificationArea = document.getElementById('notification-area');
        const editModal = document.getElementById('edit-modal');
        
        let currentEditId = null;
        let currentEditItem = null;

        function showNotification(message, type) {
            notificationArea.innerHTML = `<div class="px-4 py-2 rounded-lg shadow-lg ${type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}">${message}</div>`;
            setTimeout(() => { notificationArea.innerHTML = ''; }, 3000);
        }

        // --- Fetch & Display Logic ---
        function loadStock() {
            db.collection('stock_entries')
              .orderBy('timestamp', 'desc')
              .onSnapshot(snapshot => {
                  stockListDiv.innerHTML = '';
                  
                  if (snapshot.empty) {
                      stockListDiv.innerHTML = '<p class="text-center text-gray-500 mt-4">No stock records found.</p>';
                      return;
                  }

                  const todayStr = new Date().toDateString();
                  let todayItemCount = 0; 
                  
                  let groups = {
                      "H/P": [],
                      "KOPEK": [],
                      "SLICES": [],
                      "OTHERS": []
                  };

                  snapshot.forEach(doc => {
                      const data = doc.data();
                      const id = doc.id;
                      
                      let dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
                      if (dateObj.toDateString() !== todayStr) return; 

                      todayItemCount++;
                      data.id = id;
                      
                      let type = "OTHERS";
                      if (data.category === "Broiler" && data.categoryDetails && data.categoryDetails.type === "H/P") {
                          type = "H/P";
                      } else if (data.category === "Broiler" && data.categoryDetails && data.categoryDetails.type === "Kopek") {
                          type = "KOPEK";
                      } else if (data.category === "Slices" || (data.category === "Broiler" && data.categoryDetails && data.categoryDetails.type === "Slices")) {
                          type = "SLICES";
                      }

                      groups[type].push(data);
                  });

                  if (todayItemCount === 0) {
                      stockListDiv.innerHTML = '<p class="text-center text-gray-500 mt-4 font-semibold">No stock records found for today.</p>';
                      return;
                  }

                  const orderConfig = ["H/P", "KOPEK", "SLICES", "OTHERS"];
                  
                  orderConfig.forEach(catName => {
                      
                      if (groups[catName].length === 0) return; 

                      groups[catName].sort((a, b) => {
                          let countA = parseInt(a.categoryDetails?.count) || 0;
                          let countB = parseInt(b.categoryDetails?.count) || 0;
                          if (countA === 100 && countB !== 100) return -1;
                          if (countB === 100 && countA !== 100) return 1;
                          if (countA === 80 && countB !== 80) return -1;
                          if (countB === 80 && countA !== 80) return 1;
                          return countB - countA; 
                      });
                      
                      let totalCount = 0;
                      let totalWeight = 0;
                      
                      groups[catName].forEach(item => {
                          totalCount += (parseInt(item.categoryDetails?.count) || 0);
                          totalWeight += (parseFloat(item.netWeight) || 0);
                      });

                      const section = document.createElement('div');
                      section.className = 'mb-4 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden';
                      
                      const header = document.createElement('div');
                      header.className = 'flex justify-between items-center p-4 bg-gray-200 cursor-pointer select-none border-b border-gray-200';
                      
                      // DYNAMIC DATE INSERTED HERE
                      header.innerHTML = `
                          <div class="font-extrabold text-gray-800 text-lg">
                              ${catName} <span class="text-[17px] font-semibold text-gray-600">(${formattedToday})</span> <span class="ml-2 text-blue-700">${totalCount} - ${totalWeight.toFixed(2)} KG</span>
                          </div>
                          <svg class="text-gray-600 transition-transform duration-200" style="width: 1.5rem; height: 1.5rem; flex-shrink: 0;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                      `;
                      
                      const listGroup = document.createElement('div');
                      listGroup.className = 'hidden flex-col divide-y divide-gray-100'; 
                      
                      groups[catName].forEach(item => {
                          const row = document.createElement('div');
                          row.className = 'flex justify-between items-center p-4 hover:bg-gray-50 transition';
                          
                          let count = parseInt(item.categoryDetails?.count) || 0;
                          let weight = parseFloat(item.netWeight).toFixed(1);
                          let displayLabel = `${count} - ${weight} KG`;

                          if (catName === "OTHERS") {
                              let name = item.category || "Unknown";
                              if (item.categoryDetails?.partName) name += ` (${item.categoryDetails.partName})`;
                              if (item.categoryDetails?.type) name += ` (${item.categoryDetails.type})`;
                              if (item.remark) name += ` [${item.remark}]`;
                              displayLabel = `<span class="text-base text-gray-500 block mb-1 font-semibold">${name}</span>${displayLabel}`;
                          }

                          row.innerHTML = `
                              <div class="font-bold text-gray-900 text-lg leading-tight">
                                  ${displayLabel}
                              </div>
                              <div class="flex gap-2">
                                  <button class="edit-btn px-3 py-1.5 bg-white text-yellow-600 border border-yellow-200 rounded-lg text-[17px] font-bold shadow-sm hover:bg-yellow-50 hover:border-yellow-300 transition">EDIT</button>
                                  <button class="del-btn px-3 py-1.5 bg-white text-red-600 border border-red-200 rounded-lg text-[17px] font-bold shadow-sm hover:bg-red-50 hover:border-red-300 transition">DEL</button>
                              </div>
                          `;

                          row.querySelector('.edit-btn').addEventListener('click', (e) => { 
                              e.stopPropagation(); 
                              openEditModal(item.id, item); 
                          });
                          row.querySelector('.del-btn').addEventListener('click', (e) => { 
                              e.stopPropagation(); 
                              deleteEntry(item.id); 
                          });
                          
                          listGroup.appendChild(row);
                      });

                      header.addEventListener('click', () => {
                          listGroup.classList.toggle('hidden');
                          header.querySelector('svg').classList.toggle('rotate-180');
                      });

                      section.appendChild(header);
                      section.appendChild(listGroup);
                      stockListDiv.appendChild(section);
                  });
              }, error => {
                  console.error("Error loading stock:", error);
                  stockListDiv.innerHTML = '<p class="text-center text-red-500 mt-4">Error loading stock data.</p>';
              });
        }

        // --- Edit Logic ---
        function openEditModal(id, item) {
            currentEditId = id;
            currentEditItem = item;
            
            document.getElementById('edit-weight').value = item.grossWeight || '';
            
            let typeVal = 'H/P';
            if (item.categoryDetails && item.categoryDetails.type) {
                const t = item.categoryDetails.type;
                if (['H/P', 'Kopek', 'Slices', 'Remark'].includes(t)) {
                    typeVal = t;
                } else {
                    typeVal = 'Remark'; 
                }
            } else if (item.category === 'Slices') {
                typeVal = 'Slices';
            }
            document.getElementById('edit-category').value = typeVal;

            document.getElementById('edit-qty').value = (item.categoryDetails && item.categoryDetails.count) ? item.categoryDetails.count : '';
            document.getElementById('edit-container').value = item.container || 'Crate';
            
            editModal.classList.remove('hidden');
        }

        document.getElementById('edit-close-x').addEventListener('click', () => editModal.classList.add('hidden'));

        document.getElementById('edit-clear-btn').addEventListener('click', () => {
            document.getElementById('edit-weight').value = '';
            document.getElementById('edit-category').value = 'H/P';
            document.getElementById('edit-qty').value = '';
            document.getElementById('edit-container').value = 'Crate';
        });

        document.getElementById('edit-confirm-btn').addEventListener('click', async () => {
            const weightInput = parseFloat(document.getElementById('edit-weight').value);
            const typeInput = document.getElementById('edit-category').value;
            const qtyInput = parseInt(document.getElementById('edit-qty').value) || 0;
            const containerInput = document.getElementById('edit-container').value;

            if (isNaN(weightInput)) return alert("Please enter a valid gross weight.");

            const btn = document.getElementById('edit-confirm-btn');
            btn.disabled = true; btn.textContent = 'Updating...';

            try {
                const configSnap = await db.collection('config').doc('pricing').get();
                const config = configSnap.exists ? configSnap.data() : {};
                
                const tareCrate = parseFloat(config.tare_crate) || 1.8;
                const tareBasket = parseFloat(config.tare_basket) || 8.7;
                const tareBarrel = parseFloat(config.tare_barrel) || 5.0;
                const tareR = parseFloat(config.tare_r) || 4.7;

                let cCount = (currentEditItem.containerDetails && currentEditItem.containerDetails.count) ? currentEditItem.containerDetails.count : 1;
                let hasR = (currentEditItem.containerDetails && currentEditItem.containerDetails.hasR) ? currentEditItem.containerDetails.hasR : false;
                let hasBesi = (currentEditItem.containerDetails && currentEditItem.containerDetails.hasBesi) ? currentEditItem.containerDetails.hasBesi : false;

                let tareWeight = 0;
                if (containerInput === 'Crate') tareWeight = (cCount * tareCrate) + (hasR ? tareR : 0);
                else if (containerInput === 'Basket') tareWeight = tareBasket + (hasBesi ? 0.5 : 0) + (hasR ? tareR : 0);
                else if (containerInput === 'Barrel') tareWeight = tareBarrel + (hasR ? tareR : 0);

                const netWeight = weightInput - tareWeight;

                let categoryInput = 'Broiler';
                if (typeInput === 'Slices') categoryInput = 'Slices';

                let updatedCategoryDetails = currentEditItem.categoryDetails || {};
                updatedCategoryDetails.count = qtyInput;
                updatedCategoryDetails.type = typeInput;
                
                if (typeInput === 'Remark' && !updatedCategoryDetails.text) {
                    updatedCategoryDetails.text = currentEditItem.categoryDetails?.text || 'Edited Remark';
                }

                await db.collection('stock_entries').doc(currentEditId).update({
                    grossWeight: weightInput,
                    tareWeight: tareWeight,
                    netWeight: netWeight,
                    category: categoryInput,
                    categoryDetails: updatedCategoryDetails,
                    container: containerInput
                });

                showNotification("Stock entry updated successfully.", "success");
                editModal.classList.add('hidden');

            } catch (error) {
                console.error("Update failed:", error);
                alert("Failed to update entry.");
            } finally {
                btn.disabled = false; btn.textContent = 'Confirm & Update';
            }
        });

        async function deleteEntry(id) {
            if(confirm("Are you sure you want to delete this specific stock entry?")) {
                try {
                    await db.collection('stock_entries').doc(id).delete();
                    showNotification("Entry deleted successfully.", "success");
                } catch (error) {
                    alert("Failed to delete entry.");
                }
            }
        }

        document.getElementById('del-all-btn').addEventListener('click', async () => {
            if(confirm("⚠️ WARNING: This will permanently delete ALL stock records.\n\nAre you absolutely sure you want to proceed?")) {
                try {
                    const snapshot = await db.collection('stock_entries').get();
                    if(snapshot.empty) {
                        showNotification("No records to delete.", "error");
                        return;
                    }
                    
                    const batch = db.batch();
                    snapshot.docs.forEach(doc => {
                        batch.delete(doc.ref);
                    });
                    
                    await batch.commit();
                    showNotification("All stock records have been deleted.", "success");
                } catch (error) {
                    console.error("Batch delete failed:", error);
                    alert("Failed to delete records.");
                }
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('date-display').textContent = formattedToday;
            loadStock();
        });

    </script>
</body>
</html>
