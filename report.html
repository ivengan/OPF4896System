<body class="bg-gray-100 font-sans text-gray-800 text-[17px] leading-relaxed">
<script>
    // Session Gatekeeper
    const loginExpiry = localStorage.getItem('loginExpiry');
    if (!loginExpiry || Date.now() >= parseInt(loginExpiry)) {
        localStorage.removeItem('loginExpiry');
        window.location.href = 'index.html';
    }
</script>

    <header class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center min-h-16 py-2">
                <h1 class="text-xl font-bold text-gray-900 tracking-tight">Reports</h1>
                <button id="logout-btn" class="bg-red-500 text-white font-semibold py-2 px-4 rounded-lg hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition">Logout</button>
            </div>
        </div>
    </header>
    <main class="max-w-7xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            
            <a href="#" class="dashboard-card no-underline bg-lime-500 hover:bg-lime-600 p-6 rounded-xl text-center flex items-center justify-center min-h-[160px]">
                <h2 class="text-xl font-bold text-gray-900 tracking-tight">STAGE 1</h2>
            </a>

            <a href="#" class="dashboard-card no-underline bg-fuchsia-500 hover:bg-fuchsia-600 p-6 rounded-xl text-center flex items-center justify-center min-h-[160px]">
                <h2 class="text-xl font-bold text-gray-900 tracking-tight">STAGE 2</h2>
            </a>

            <a href="#" class="dashboard-card no-underline bg-amber-500 hover:bg-amber-600 p-6 rounded-xl text-center flex items-center justify-center min-h-[160px]">
                <h2 class="text-xl font-bold text-gray-900 tracking-tight">STOCK (Chiller)</h2>
            </a>

            <a href="#" class="dashboard-card no-underline bg-sky-500 hover:bg-sky-600 p-6 rounded-xl text-center flex items-center justify-center min-h-[160px]">
                <h2 class="text-xl font-bold text-gray-900 tracking-tight">STOCK (Freezer)</h2>
            </a>
            
        </div>
    </main>
    <script>
        document.getElementById('logout-btn').addEventListener('click', () => {
		localStorage.removeItem('loginExpiry'); // Clear the session
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
