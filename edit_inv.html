<body class="bg-gray-100 font-sans text-gray-800 text-[17px] leading-relaxed">

<script>
    // Session Gatekeeper
    const loginExpiry = localStorage.getItem('loginExpiry');
    if (!loginExpiry || Date.now() >= parseInt(loginExpiry)) {
        localStorage.removeItem('loginExpiry');
        window.location.href = 'index.html';
    }
</script>
    <header class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center min-h-16 py-2">
                <div class="flex items-center gap-4">
                    <a href="dashboard2.html" class="text-blue-600 font-bold whitespace-nowrap hover:text-blue-800 inline-flex items-center gap-1">&larr; back</a>
                    <h1 class="text-xl font-bold text-gray-900 tracking-tight">Edit Inventory</h1>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <div class="bg-white p-4 rounded-lg shadow-sm">
            <div class="flex flex-col gap-4">
                <input type="text" id="item-name-input" placeholder="Item Name" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500">
                <input type="text" id="item-desc-input" placeholder="Description (e.g., 2.5 KG/pack)" class="w-full border border-gray-300 rounded-lg p-3">
                <div class="flex justify-center gap-2">
                    <button id="add-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        Add
                    </button>
                    <button id="update-btn" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-4 rounded-lg flex items-center disabled:opacity-50 disabled:cursor-not-allowed">
                        Update
                    </button>
                    <button id="delete-btn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg flex items-center disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 12H6"></path></svg>
                    </button>
                </div>
            </div>
            <div id="notification-area" class="mt-4"></div>
        </div>

        <div class="mt-6">
            <h2 class="text-xl font-bold text-gray-900 tracking-tight">Inventory Items</h2>
            <div id="inventory-list" class="mt-2 bg-white rounded-lg shadow-sm overflow-hidden">
                </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQAKliT1QN8H-FOuNzvUGArbyQfM_U5MA",
            authDomain: "opf4896system.firebaseapp.com",
            projectId: "opf4896system",
            storageBucket: "opf4896system.appspot.com",
            messagingSenderId: "150864121707",
            appId: "1:150864121707:web:b3161a86514c1d86dd062e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        db.enablePersistence({ synchronizeTabs: true }).catch(err => console.log('Offline persistence error:', err.code));

        const itemNameInput = document.getElementById('item-name-input');
        // CHANGED variable name
        const itemDescInput = document.getElementById('item-desc-input');
        const addBtn = document.getElementById('add-btn');
        const updateBtn = document.getElementById('update-btn');
        const deleteBtn = document.getElementById('delete-btn');
        const inventoryListDiv = document.getElementById('inventory-list');
        const notificationArea = document.getElementById('notification-area');
        
        let allItems = [];
        let selectedItemId = null;
        let selectedItemDiv = null;

        function showNotification(message, type) {
            notificationArea.innerHTML = `<div class="p-3 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${message}</div>`;
            setTimeout(() => { notificationArea.innerHTML = ''; }, 3000);
        }

        function resetSelection() {
            selectedItemId = null;
            if (selectedItemDiv) {
                selectedItemDiv.classList.remove('selected-item');
                selectedItemDiv = null;
            }
            itemNameInput.value = '';
            itemDescInput.value = '';
            updateBtn.disabled = true;
            deleteBtn.disabled = true;
        }

        function displayItems(items) {
            inventoryListDiv.innerHTML = '';
            if (items.length === 0) {
                inventoryListDiv.innerHTML = '<p class="p-4 text-gray-500">No items found.</p>';
                return;
            }
            items.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'inventory-item flex justify-between items-center p-4 border-b border-gray-200';
                itemDiv.dataset.id = item.id;
                
                if (item.id === selectedItemId) {
                    itemDiv.classList.add('selected-item');
                    selectedItemDiv = itemDiv;
                }
                // CHANGED to display description
                itemDiv.innerHTML = `<span class="font-semibold text-gray-700">${item.displayName}</span><span class="text-gray-900">${item.description || ''}</span>`;
                
                itemDiv.addEventListener('click', () => {
                    if (selectedItemId === item.id) {
                        resetSelection();
                    } else {
                        if (selectedItemDiv) {
                            selectedItemDiv.classList.remove('selected-item');
                        }
                        selectedItemId = item.id;
                        selectedItemDiv = itemDiv;
                        selectedItemDiv.classList.add('selected-item');
                        
                        itemNameInput.value = item.displayName;
                        // CHANGED to populate description
                        itemDescInput.value = item.description || '';
                        updateBtn.disabled = false;
                        deleteBtn.disabled = false;
                    }
                });
                inventoryListDiv.appendChild(itemDiv);
            });
        }

        async function fetchAndDisplayInventory() {
            try {
                const snapshot = await db.collection('inventory').orderBy('name').get();
                allItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const searchTerm = itemNameInput.value.toLowerCase();
                const filteredItems = allItems.filter(item => item.name.includes(searchTerm));
                displayItems(filteredItems);
                resetSelection();
            } catch (error) {
                showNotification('Error fetching inventory.', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', fetchAndDisplayInventory);
        
        addBtn.addEventListener('click', async () => {
            const name = itemNameInput.value.trim();
            // CHANGED to use description
            const description = itemDescInput.value.trim();
            if (!name) { // Description can be optional
                showNotification('Please enter a valid item name.', 'error');
                return;
            }
            try {
                await db.collection('inventory').add({
                    name: name.toLowerCase(),
                    displayName: name,
                    description: description
                });
                showNotification('Item added successfully!', 'success');
                itemNameInput.value = '';
                itemDescInput.value = '';
                fetchAndDisplayInventory();
            } catch (error) {
                showNotification('Error adding item.', 'error');
            }
        });

        updateBtn.addEventListener('click', async () => {
            if (!selectedItemId) return;
            const name = itemNameInput.value.trim();
            // CHANGED to use description
            const description = itemDescInput.value.trim();
            if (!name) {
                showNotification('Please enter a valid name to update.', 'error');
                return;
            }
            try {
                await db.collection('inventory').doc(selectedItemId).update({
                    name: name.toLowerCase(),
                    displayName: name,
                    description: description
                });
                showNotification('Item updated successfully!', 'success');
                fetchAndDisplayInventory();
            } catch (error) {
                showNotification('Error updating item.', 'error');
            }
        });

        deleteBtn.addEventListener('click', async () => {
            if (!selectedItemId) return;
            if (confirm(`Are you sure you want to delete "${itemNameInput.value}"?`)) {
                try {
                    await db.collection('inventory').doc(selectedItemId).delete();
                    showNotification('Item deleted successfully!', 'success');
                    fetchAndDisplayInventory();
                } catch (error) {
                    showNotification('Error deleting item.', 'error');
                }
            }
        });
        
        itemNameInput.addEventListener('input', () => {
            const searchTerm = itemNameInput.value.toLowerCase();
            if(selectedItemId) {
                resetSelection();
            }
            const filteredItems = allItems.filter(item => item.name.includes(searchTerm));
            displayItems(filteredItems);
        });
    </script>
</body>
</html>
