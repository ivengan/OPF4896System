<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customers - Multi-Function System</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="/icons/icon-192.png">
    <style>

        .text-pink-800 { color: #9d174d; } .bg-pink-100 { background-color: #fce7f3; } .border-pink-200 { border-color: #fbcfe8; }
        .text-blue-800 { color: #1e40af; } .bg-blue-100 { background-color: #dbeafe; } .border-blue-200 { border-color: #bfdbfe; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 text-[17px] leading-relaxed">
    <script>
        if (!localStorage.getItem('loginExpiry') || Date.now() >= parseInt(localStorage.getItem('loginExpiry'))) {
            localStorage.removeItem('loginExpiry'); window.location.href = '/index.html';
        }
    </script>

    <header class="bg-white shadow-md sticky top-0 z-20">
         <div class="max-w-7xl mx-auto px-4 p-4">
             <div class="flex justify-between items-center">
                 <div class="flex items-center gap-4">
                     <a href="dashboard2.html" class="text-blue-600 font-bold whitespace-nowrap hover:text-blue-800 inline-flex items-center gap-1">&larr; back</a>
                     <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Edit Customers</h1>
                 </div>
                 <button id="add-cust-btn" class="bg-blue-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-600 transition shadow-md">+ Add Customer</button>
             </div>
         </div>
    </header>

    <main class="max-w-7xl mx-auto py-6 px-4">
        
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Customer Directory</h2>
            <select id="sort-select" class="border border-gray-300 rounded-lg p-2 text-[17px] font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm">
                <option value="driver" selected>Sort: By Driver (Lorry)</option>
                <option value="alpha">Sort: Alphabetically</option>
                <option value="parts">Sort: Default Parts</option>
            </select>
        </div>

        <div id="notification-area" class="mb-4 fixed top-20 right-4 z-50"></div>
        
        <div id="customer-list" class="pb-8">
            <p class="text-center text-gray-500">Loading customers...</p>
        </div>
    </main>

    <div id="cust-modal" class="fixed inset-0 z-50 bg-gray-900 bg-opacity-50 items-center justify-center p-4" style="display: none;">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 id="modal-title" class="text-2xl font-bold text-gray-900 tracking-tight">Add Customer</h2>
                <button id="modal-close" class="text-gray-500 hover:text-gray-700 font-bold text-2xl px-2">&times;</button>
            </div>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-[17px] font-bold text-gray-700">Customer Name</label>
                    <input type="text" id="cust-name" class="w-full border border-gray-300 rounded-lg p-3 mt-1 focus:ring-2 focus:ring-blue-500" placeholder="e.g. Best Mart">
                </div>
                <div>
                    <label class="block text-[17px] font-bold text-gray-700">Lorry Plate / Driver</label>
                    <input type="text" id="cust-lorry" class="w-full border border-gray-300 rounded-lg p-3 mt-1 focus:ring-2 focus:ring-blue-500" placeholder="e.g. JWP 9168">
                </div>
                <div>
                    <label class="block text-[17px] font-bold text-gray-700">Whatsapp/Phone no.</label>
                    <input type="tel" id="cust-phone" class="w-full border border-gray-300 rounded-lg p-3 mt-1 focus:ring-2 focus:ring-blue-500" placeholder="e.g. 60123456789">
                </div>
                <div>
                    <label class="block text-[17px] font-bold text-gray-700">Description / Area</label>
                    <input type="text" id="cust-desc" class="w-full border border-gray-300 rounded-lg p-3 mt-1 focus:ring-2 focus:ring-blue-500" placeholder="e.g. Parit Raja">
                </div>
                
                <div class="p-3 bg-gray-50 border border-gray-200 rounded-lg mt-4">
                    <label class="block text-[17px] font-bold text-gray-800 mb-2">Default Parts Stock Routing</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="defaultStock" value="Freeze" checked class="h-5 w-5 text-blue-600 focus:ring-blue-500">
                            <span class="font-bold text-gray-700">Freeze (Ais)</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="defaultStock" value="Lembik" class="h-5 w-5 text-pink-600 focus:ring-pink-500">
                            <span class="font-bold text-gray-700">Lembik (No Pack)</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 pt-4">
                <button id="modal-del-btn" class="w-1/3 bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl transition shadow-md" style="display: none;">Delete</button>
                <button id="modal-save-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition shadow-md">Save</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQAKliT1QN8H-FOuNzvUGArbyQfM_U5MA",
            authDomain: "opf4896system.firebaseapp.com",
            projectId: "opf4896system",
            storageBucket: "opf4896system.appspot.com",
            messagingSenderId: "150864121707",
            appId: "1:150864121707:web:b3161a86514c1d86dd062e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const listDiv = document.getElementById('customer-list');
        const sortSelect = document.getElementById('sort-select');
        const modal = document.getElementById('cust-modal');
        
        let allCustomers = [];
        let currentEditingId = null;
        let notificationTimer = null; 

        // Strictly controlled modal closing
        function closeModal() {
            modal.style.display = 'none'; 
        }

        // Fetch Data Once & Setup Real-time Listener
        function loadCustomers() {
            db.collection('customers').onSnapshot(snap => {
                allCustomers = [];
                snap.forEach(doc => {
                    allCustomers.push({ id: doc.id, ...doc.data() });
                });
                renderCustomers();
            });
        }

        // Handle Sorting and Rendering with Headers
        function renderCustomers() {
            listDiv.innerHTML = '';
            if (allCustomers.length === 0) { 
                listDiv.innerHTML = '<p class="text-center text-gray-500">No customers found.</p>'; 
                return; 
            }

            const sortMode = sortSelect.value;
            let sorted = [...allCustomers];

            sorted.sort((a, b) => {
                if (sortMode === 'alpha') {
                    return (a.displayName || '').localeCompare(b.displayName || '');
                } 
                else if (sortMode === 'driver') {
                    const lorryA = (a.lorry || 'None').toLowerCase();
                    const lorryB = (b.lorry || 'None').toLowerCase();
                    if (lorryA < lorryB) return -1;
                    if (lorryA > lorryB) return 1;
                    return (a.displayName || '').localeCompare(b.displayName || ''); 
                } 
                else if (sortMode === 'parts') {
                    const stockA = (a.defaultStock || 'Freeze').toLowerCase();
                    const stockB = (b.defaultStock || 'Freeze').toLowerCase();
                    if (stockA < stockB) return -1;
                    if (stockA > stockB) return 1;
                    return (a.displayName || '').localeCompare(b.displayName || ''); 
                }
            });

            let currentGroupKey = null;

            sorted.forEach(d => {
                let groupKey = '';
                
                if (sortMode === 'alpha') {
                    groupKey = (d.displayName || '#').charAt(0).toUpperCase();
                } else if (sortMode === 'driver') {
                    groupKey = d.lorry || 'None';
                } else if (sortMode === 'parts') {
                    groupKey = d.defaultStock || 'Freeze';
                }

                if (groupKey !== currentGroupKey) {
                    const header = document.createElement('h3');
                    header.className = 'text-xl font-bold text-gray-800 mt-6 mb-3 border-b-2 border-blue-500 pb-1';
                    header.textContent = groupKey;
                    listDiv.appendChild(header);
                    currentGroupKey = groupKey;
                }

                const defaultStock = d.defaultStock || 'Freeze';
                const badgeColor = defaultStock === 'Lembik' ? 'bg-pink-100 text-pink-800 border-pink-200' : 'bg-blue-100 text-blue-800 border-blue-200';

                const card = document.createElement('div');
                card.className = 'customer-card flex justify-between items-center';
                card.innerHTML = `
                    <div>
                        <div class="font-bold text-lg text-gray-800">${d.displayName || 'Unnamed'}</div>
                        <div class="text-[17px] text-gray-500">Lorry: <span class="font-bold text-gray-700">${d.lorry || 'None'}</span> | Area: ${d.description || 'None'}</div>
                        <div class="mt-2 text-base font-bold px-2 py-1 rounded border inline-block ${badgeColor}">Default Parts: ${defaultStock}</div>
                    </div>
                    <button class="edit-btn bg-gray-100 border border-gray-300 text-gray-700 px-4 py-2 rounded-lg font-bold hover:bg-gray-200 transition shadow-sm">EDIT</button>
                `;
                card.querySelector('.edit-btn').addEventListener('click', () => openModal(d.id, d));
                listDiv.appendChild(card);
            });
        }

        sortSelect.addEventListener('change', renderCustomers);

        function openModal(id = null, data = null) {
            currentEditingId = id;
            if (data) {
                document.getElementById('modal-title').textContent = 'Edit Customer';
                document.getElementById('cust-name').value = data.displayName || '';
                document.getElementById('cust-lorry').value = data.lorry || '';
                document.getElementById('cust-phone').value = data.phone || '';
                document.getElementById('cust-desc').value = data.description || '';
                document.querySelector(`input[name="defaultStock"][value="${data.defaultStock || 'Freeze'}"]`).checked = true;
                document.getElementById('modal-del-btn').style.display = 'block';
            } else {
                document.getElementById('modal-title').textContent = 'Add Customer';
                document.getElementById('cust-name').value = '';
                document.getElementById('cust-lorry').value = '';
                document.getElementById('cust-phone').value = '';
                document.getElementById('cust-desc').value = '';
                document.querySelector(`input[name="defaultStock"][value="Freeze"]`).checked = true;
                document.getElementById('modal-del-btn').style.display = 'none';
            }
            
            modal.style.display = 'flex'; 
        }

        document.getElementById('add-cust-btn').addEventListener('click', () => openModal());
        document.getElementById('modal-close').addEventListener('click', closeModal); 

        document.getElementById('modal-save-btn').addEventListener('click', async () => {
            const name = document.getElementById('cust-name').value.trim();
            const lorry = document.getElementById('cust-lorry').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const desc = document.getElementById('cust-desc').value.trim();
            const stock = document.querySelector('input[name="defaultStock"]:checked').value;

            if(!name) return alert("Customer Name is required.");
            
            const btn = document.getElementById('modal-save-btn');
            btn.disabled = true; btn.textContent = "Saving...";

            const payload = { displayName: name, lorry: lorry, phone: phone, description: desc, defaultStock: stock };

            try {
                if (currentEditingId) {
                    await db.collection('customers').doc(currentEditingId).update(payload);
                    showNotification("Customer Updated");
                } else {
                    await db.collection('customers').add(payload);
                    showNotification("Customer Added");
                }
                closeModal(); 
            } catch(e) { alert("Failed to save"); }
            finally { btn.disabled = false; btn.textContent = "Save"; }
        });

        document.getElementById('modal-del-btn').addEventListener('click', async () => {
            if(confirm("Delete this customer entirely?")) {
                try {
                    await db.collection('customers').doc(currentEditingId).delete();
                    showNotification("Customer Deleted");
                    closeModal(); 
                } catch(e) { alert("Failed to delete"); }
            }
        });

        function showNotification(msg) {
            if (notificationTimer) clearTimeout(notificationTimer);
            const area = document.getElementById('notification-area');
            area.innerHTML = `<div class="px-4 py-2 bg-green-500 text-white rounded-lg shadow-lg font-bold">${msg}</div>`;
            notificationTimer = setTimeout(() => area.innerHTML = '', 3000);
        }

        document.addEventListener('DOMContentLoaded', loadCustomers);
    </script>
</body>
</html>
