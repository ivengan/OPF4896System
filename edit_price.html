<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Pricing - Multi-Function System</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="/icons/icon-192.png">
    <style>

</head>
<body class="bg-gray-100">
<script>
    // Session Gatekeeper
    const loginExpiry = localStorage.getItem('loginExpiry');
    if (!loginExpiry || Date.now() >= parseInt(loginExpiry)) {
        localStorage.removeItem('loginExpiry');
        window.location.href = '/index.html';
    }
</script>

    <header class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-4">
                    <a href="dashboard2.html" class="text-blue-500 hover:text-blue-700">&larr; Back</a>
                    <h1 class="text-2xl font-bold text-gray-800">Edit Pricing</h1>
                </div>
                <button id="logout-btn" class="bg-red-500 text-white font-semibold py-2 px-4 rounded-lg hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition">Logout</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">

        <div id="notification-area" class="mb-6"></div>

        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-3xl font-bold text-gray-900 mb-6">Broiler Price</h2>
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <label for="wholesale-price" class="text-lg font-semibold text-gray-700">Wholesale:</label>
                    <div class="flex items-center gap-2">
                        <span class="text-lg font-semibold text-gray-500">RM</span>
                        <input type="number" id="wholesale-price" step="0.10" class="w-32 border border-gray-300 rounded-lg p-2 text-center text-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <label for="msrp-price" class="text-lg font-semibold text-gray-700">MSRP:</label>
                    <div class="flex items-center gap-2">
                        <span class="text-lg font-semibold text-gray-500">RM</span>
                        <input type="number" id="msrp-price" step="0.10" class="w-32 border border-gray-300 rounded-lg p-2 text-center text-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <label for="slices-price" class="text-lg font-semibold text-gray-700">Slices:</label>
                    <div class="flex items-center gap-2">
                        <span class="text-lg font-semibold text-gray-500">RM</span>
                        <input type="number" id="slices-price" step="0.10" class="w-32 border border-gray-300 rounded-lg p-2 text-center text-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
            </div>
            <div class="mt-6">
                 <button id="confirm-broiler-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold text-lg py-3 rounded-lg shadow-md transition">CONFIRM BROILER PRICES</button>
            </div>
        </div>

        <div class="mt-8 bg-white p-6 rounded-lg shadow">
            <h2 class="text-3xl font-bold text-gray-900 mb-6">Parts Pricing</h2>
            <div class="flex items-center gap-2 border-b border-gray-200 pb-4">
                <label for="new-part-name" class="font-semibold text-gray-700">Add/Del Part:</label>
                <input type="text" id="new-part-name" placeholder="e.g., Wing, Drumstick" class="flex-1 w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                <button id="add-part-btn" class="bg-green-500 hover:bg-green-600 text-white p-2 rounded-lg flex items-center gap-2 font-semibold">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    ADD
                </button>
                <button id="del-part-btn" class="bg-red-500 hover:bg-red-600 text-white p-2 rounded-lg flex items-center gap-2 font-semibold">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 12H6"></path></svg>
                    DELETE
                </button>
            </div>
            <div id="parts-list" class="mt-4">
                </div>
        </div>

        <div class="mt-8">
            <button id="confirm-all-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold text-lg py-3 rounded-lg shadow-md transition">CONFIRM ALL PAGE CHANGES</button>
        </div>

    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQAKliT1QN8H-FOuNzvUGArbyQfM_U5MA",
            authDomain: "opf4896system.firebaseapp.com",
            projectId: "opf4896system",
            storageBucket: "opf4896system.appspot.com",
            messagingSenderId: "150864121707",
            appId: "1:150864121707:web:b3161a86514c1d86dd062e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const pricingDocRef = db.collection('config').doc('pricing');

        // --- DOM References ---
        const wholesaleInput = document.getElementById('wholesale-price');
        const msrpInput = document.getElementById('msrp-price');
        const slicesInput = document.getElementById('slices-price');
        const confirmBroilerBtn = document.getElementById('confirm-broiler-btn');
        const newPartNameInput = document.getElementById('new-part-name');
        const addPartBtn = document.getElementById('add-part-btn');
        const delPartBtn = document.getElementById('del-part-btn');
        const partsListDiv = document.getElementById('parts-list');
        const confirmAllBtn = document.getElementById('confirm-all-btn');
        const notificationArea = document.getElementById('notification-area');

        function showNotification(message, type) {
            notificationArea.innerHTML = `<div class="p-3 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${message}</div>`;
            setTimeout(() => { notificationArea.innerHTML = ''; }, 3000);
        }

        function displayParts(partsMap = {}) {
            partsListDiv.innerHTML = '';
            const sortedPartNames = Object.keys(partsMap).sort();

            if (sortedPartNames.length === 0) {
                partsListDiv.innerHTML = '<p class="text-gray-500 p-2">No parts added yet.</p>';
                return;
            }

            sortedPartNames.forEach((partName, index) => {
                const price = partsMap[partName];
                const partDiv = document.createElement('div');
                partDiv.className = `flex items-center justify-between p-3 rounded-lg ${index % 2 === 0 ? 'bg-white' : 'bg-gray-50'}`;
                partDiv.innerHTML = `
                    <label class="text-lg font-semibold text-gray-700">${partName}</label>
                    <div class="flex items-center gap-2">
                        <span class="text-lg font-semibold text-gray-500">RM</span>
                        <input type="number" step="0.10" value="${price.toFixed(2)}" data-part-name="${partName}" class="part-price-input w-32 border border-gray-300 rounded-lg p-2 text-center text-lg focus:ring-2 focus:ring-blue-500">
                        <button data-part-name-save="${partName}" class="save-part-btn bg-green-500 hover:bg-green-600 text-white p-2 rounded-lg flex items-center gap-2 font-semibold">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            CONFIRM
                        </button>
                    </div>
                `;
                partsListDiv.appendChild(partDiv);
            });
        }

        async function loadPrices() {
            try {
                const doc = await pricingDocRef.get();
                if (doc.exists) {
                    const data = doc.data();
                    wholesaleInput.value = (data.broiler_wholesale || 0).toFixed(2);
                    msrpInput.value = (data.broiler_msrp || 0).toFixed(2);
                    slicesInput.value = (data.broiler_slices || 0).toFixed(2);
                    displayParts(data.parts || {});
                } else {
                    displayParts({});
                }
            } catch (error) {
                showNotification('Error loading prices.', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', loadPrices);
        
        confirmBroilerBtn.addEventListener('click', async () => {
             if (confirm('Are you sure you want to save the Broiler Prices?')) {
                try {
                    await pricingDocRef.set({
                        broiler_wholesale: parseFloat(wholesaleInput.value),
                        broiler_msrp: parseFloat(msrpInput.value),
                        broiler_slices: parseFloat(slicesInput.value)
                    }, { merge: true });
                    showNotification('Broiler prices have been saved successfully!', 'success');
                } catch (error) {
                    showNotification('An error occurred while saving broiler prices.', 'error');
                }
            }
        });

        addPartBtn.addEventListener('click', async () => {
            const partName = newPartNameInput.value.trim();
            if (!partName) return;
            try {
                await pricingDocRef.set({ parts: { [partName]: 0 } }, { merge: true });
                showNotification(`Part "${partName}" added.`, 'success');
                newPartNameInput.value = '';
                loadPrices();
            } catch (error) {
                showNotification('Error adding part.', 'error');
            }
        });

        delPartBtn.addEventListener('click', async () => {
            const partName = newPartNameInput.value.trim();
            if (!partName) {
                showNotification('Please enter a part name to delete.', 'error');
                return;
            }
            if (confirm(`Are you sure you want to permanently delete the part "${partName}"?`)) {
                try {
                    await pricingDocRef.update({
                        [`parts.${partName}`]: firebase.firestore.FieldValue.delete()
                    });
                    showNotification(`Part "${partName}" deleted.`, 'success');
                    newPartNameInput.value = '';
                    loadPrices();
                } catch (error) {
                    showNotification('Error deleting part. It may not exist.', 'error');
                }
            }
        });

        partsListDiv.addEventListener('click', async (e) => {
            const saveButton = e.target.closest('.save-part-btn');
            if (saveButton) {
                const partName = saveButton.dataset.partNameSave;
                const priceInput = document.querySelector(`input[data-part-name="${partName}"]`);
                const newPrice = parseFloat(priceInput.value);
                if (isNaN(newPrice)) {
                    showNotification('Please enter a valid price.', 'error');
                    return;
                }
                if (confirm(`Update "${partName}" price to RM ${newPrice.toFixed(2)}?`)) {
                    try {
                        await pricingDocRef.update({
                            [`parts.${partName}`]: newPrice
                        });
                        showNotification(`"${partName}" price updated.`, 'success');
                    } catch (error) {
                        showNotification('Error updating part price.', 'error');
                    }
                }
            }
        });

        confirmAllBtn.addEventListener('click', async () => {
            if (confirm('Are you sure you want to save ALL prices on this page?')) {
                try {
                    const broiler_wholesale = parseFloat(wholesaleInput.value);
                    const broiler_msrp = parseFloat(msrpInput.value);
                    const broiler_slices = parseFloat(slicesInput.value);
                    const parts = {};
                    document.querySelectorAll('.part-price-input').forEach(input => {
                        parts[input.dataset.partName] = parseFloat(input.value);
                    });
                    await pricingDocRef.set({
                        broiler_wholesale,
                        broiler_msrp,
                        broiler_slices,
                        parts
                    }, { merge: true });
                    showNotification('All prices have been saved successfully!', 'success');
                } catch (error) {
                    showNotification('An error occurred while saving all prices.', 'error');
                }
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
		localStorage.removeItem('loginExpiry'); // Clear the session
            window.location.href = '/index.html';
        });
    </script>
</body>
</html>
