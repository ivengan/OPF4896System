<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Orders - Multi-Function System</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png">
    <style>
        :root {
            --bg-app: #f4f4f5;
            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --text-main: #18181b;
            --text-muted: #52525b;
            --primary: #27272a;
            --primary-hover: #3f3f46;
            --danger: #991b1b;
            --danger-muted: #fef2f2;
            --border: #e4e4e7;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        *, ::after, ::before { box-sizing: border-box; }
        html { line-height: 1.5; -webkit-text-size-adjust: 100%; }
        body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: var(--bg-app); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        button { cursor: pointer; appearance: none; transition: all 0.2s ease; }
        
        .header { background: var(--bg-header); padding: 0.75rem 1.25rem; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 20; }
        .title { font-size: 1.1rem; font-weight: 800; color: var(--text-main); text-transform: uppercase; }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 0.75rem; box-shadow: var(--shadow); padding: 1.25rem; margin-bottom: 1rem; }
        
        /* Minimalist Buttons */
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.75rem 1.25rem; border-radius: 0.5rem; font-weight: 700; font-size: 0.9rem; border: 1px solid transparent; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: white; border: 1px solid var(--border); color: var(--text-main); }
        .btn-secondary:hover { background: var(--bg-app); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger-muted); }

        .input { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border); font-size: 1rem; background: white; color: var(--text-main); }
        .input:focus { outline: 2px solid var(--primary); border-color: transparent; }

        .label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.4rem; }
        
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .w-full { width: 100%; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .whitespace-nowrap { white-space: nowrap; }
    </style>
</head>
<body>

    <script>
        const loginExpiry = localStorage.getItem('loginExpiry');
        if (!loginExpiry || Date.now() >= parseInt(loginExpiry)) {
            localStorage.removeItem('loginExpiry');
            localStorage.removeItem('user_phone');
            window.location.href = 'index.html';
        }
    </script>

    <header class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center min-h-16 py-2 relative">
                <div class="flex items-center gap-4">
                    <a href="dashboard.html" class="text-blue-600 font-bold whitespace-nowrap hover:text-blue-800 inline-flex items-center gap-1">&larr; back</a>
                    <h1 class="text-xl font-bold text-gray-900 tracking-tight">Submit Staff Order</h1>
                </div>
                <div id="header-today-date" class="font-bold text-gray-800 text-lg" style="position: absolute; left: 50%; transform: translateX(-50%);"></div>
                <div class="flex items-center gap-2">
                    <button id="ai-scan-btn" disabled class="bg-gray-400 text-white font-semibold py-2 px-3 rounded-lg shadow-md transition flex items-center gap-2 cursor-not-allowed">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                        <span class="hidden sm:inline">Smart Order (AI)</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <div id="notification-area" class="mb-6"></div>
        
        <form id="order-form" class="bg-white p-6 rounded-lg shadow-lg space-y-8">
            
            <div>
                <label for="customer-search" class="text-lg font-bold text-gray-800">1. Customer</label>
                <input list="customer-names-list" id="customer-search" class="w-full border border-gray-300 rounded-lg p-3 text-lg focus:ring-2 focus:ring-blue-500 mt-2" placeholder="Type to search customer...">
                <datalist id="customer-names-list"></datalist>
                <input type="text" id="customer-remark" class="w-full border border-gray-300 rounded-lg p-2 mt-2 text-[17px] text-gray-600 italic focus:ring-2 focus:ring-blue-500" placeholder="Remark for Customer (e.g., Deliver to back door)">
            </div>

            <div>
                <label for="delivery-date" class="text-lg font-bold text-gray-800">2. Delivery Date</label>
                <input type="date" id="delivery-date" class="w-full border border-gray-300 rounded-lg p-3 text-lg focus:ring-2 focus:ring-blue-500 mt-2">
            </div>

            <div id="broiler-section" class="p-4 bg-gray-50 rounded-lg border border-gray-200 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-900 tracking-tight">3. Broiler/ Slices</h2>
                    <span id="customer-tier-display" class="text-[17px] font-medium text-blue-500 hidden"></span>
                </div>
                
                <div class="space-y-6">
                    <div class="space-y-2">
                        <div class="flex items-center justify-between">
                            <label for="broiler-main-qty" class="text-lg font-semibold text-gray-700">Whole Broiler</label>
                            <input type="number" id="broiler-main-qty" placeholder="0" class="w-32 border border-gray-300 rounded-lg p-2 text-center text-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <input type="text" id="broiler-main-remark" class="w-full border border-gray-300 rounded-lg p-2 text-[17px] text-gray-600 italic focus:ring-2 focus:ring-blue-500" placeholder="Remark: Potong 9, Buang leher...">
                    </div>
                    
                    <div class="space-y-2">
                        <div class="flex items-center justify-between">
                            <label for="broiler-slices-qty" class="text-lg font-semibold text-gray-700">Slices</label>
                            <input type="number" id="broiler-slices-qty" placeholder="0" class="w-32 border border-gray-300 rounded-lg p-2 text-center text-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <input type="text" id="broiler-slices-remark" class="w-full border border-gray-300 rounded-lg p-2 text-[17px] text-gray-600 italic focus:ring-2 focus:ring-blue-500" placeholder="Remark: Breast only...">
                    </div>
                </div>
            </div>

            <div id="parts-section" class="p-4 bg-gray-50 rounded-lg border border-gray-200 shadow-sm">
                <h2 class="text-xl font-bold text-gray-900 tracking-tight mb-4">4. Parts</h2>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm space-y-2">
                    <div class="flex flex-col sm:flex-row gap-2">
                        <input list="item-names-list" id="part-name" placeholder="Item Name" class="flex-grow w-full border border-gray-300 rounded-lg p-3 text-lg focus:ring-2 focus:ring-blue-500">
                        <input type="number" id="part-qty" placeholder="Qty" class="w-full sm:w-24 border border-gray-300 rounded-lg p-3 text-lg focus:ring-2 focus:ring-blue-500">
                        <select id="part-unit" class="w-full sm:w-32 border border-gray-300 rounded-lg p-3 text-lg focus:ring-2 focus:ring-blue-500">
                            <option value="KG">KG</option>
                            <option value="Pack">Pack</option>
                            <option value="PCS">PCS</option>
                        </select>
                    </div>
                    <input type="text" id="part-remark" class="w-full border border-gray-300 rounded-lg p-2 text-[17px] text-gray-600 italic focus:ring-2 focus:ring-blue-500" placeholder="Remark for this part (e.g. 2KG packs)...">
                    <button type="button" id="add-part-btn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold p-2 rounded-lg transition">Add Part</button>
                </div>

                <datalist id="item-names-list"></datalist>
                
                <div id="parts-order-list" class="space-y-2 mt-4">
                    <p class="text-gray-500 italic">No parts added yet.</p>
                </div>
            </div>

            <div>
                <label for="order-general-remark" class="text-lg font-bold text-gray-800">5. General Order Remark</label>
                <textarea id="order-general-remark" rows="2" class="w-full border border-gray-300 rounded-lg p-3 text-lg focus:ring-2 focus:ring-blue-500 mt-2" placeholder="Any other notes for the whole order..."></textarea>
            </div>

            <div class="flex justify-end gap-2 mt-6">
                <button type="button" id="clear-btn" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg transition">Clear</button>
                <button type="submit" id="pre-submit-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-lg transition">Submit Order</button>
            </div>
        </form>
    </main>

    <div id="ai-modal" class="hidden fixed inset-0 z-50 bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 class="text-xl font-bold text-gray-900 tracking-tight flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Smart Order
                </h2>
                <button id="close-ai-modal" class="text-gray-500 hover:text-gray-700 font-bold text-2xl">&times;</button>
            </div>
            
            <div id="ai-status-indicator" class="text-base font-mono p-2 bg-gray-100 rounded text-gray-600 mb-2">
                Initializing AI connection...
            </div>

            <p class="text-[17px] text-gray-600">Paste the full WhatsApp message or text order below.</p>
            <textarea id="ai-input-text" rows="5" class="w-full border border-gray-300 rounded-lg p-3 text-[17px] focus:ring-2 focus:ring-indigo-500" placeholder="e.g., Boss tomorrow Ah Seng want 10 chickens..."></textarea>
            
            <div id="ai-loading" class="hidden text-center py-2">
                <p class="text-indigo-600 font-bold animate-pulse">AI is thinking...</p>
            </div>

            <button id="process-ai-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition shadow-md">Process Order</button>
        </div>
    </div>

    <div id="confirmation-modal" class="hidden fixed inset-0 z-50 bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 space-y-6">
            <h2 class="text-xl font-bold text-gray-900 tracking-tight border-b pb-2">Confirm Order</h2>
            <div class="space-y-4 text-gray-700">
                <div class="bg-gray-50 p-3 rounded-lg">
                    <h3 class="font-semibold text-gray-900">Customer</h3>
                    <div id="confirm-customer-text" class="text-lg"></div>
                </div>
                <div class="bg-gray-50 p-3 rounded-lg">
                    <h3 class="font-semibold text-gray-900 mb-1">Order Details</h3>
                    <div id="confirm-product-list" class="space-y-2 text-base"></div>
                </div>
            </div>
            <div class="flex gap-3 pt-2">
                <button id="modal-edit-btn" class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-3 rounded-xl transition">Edit</button>
                <button id="modal-confirm-btn" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition">Submit</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQAKliT1QN8H-FOuNzvUGArbyQfM_U5MA",
            authDomain: "opf4896system.firebaseapp.com",
            projectId: "opf4896system",
            storageBucket: "opf4896system.firebasestorage.app",
            messagingSenderId: "150864121707",
            appId: "1:150864121707:web:b3161a86514c1d86dd062e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        db.enablePersistence({ synchronizeTabs: true }).catch(err => console.log('Offline persistence error:', err.code));

        // --- GEMINI API SETUP ---
        // We load the key from localStorage to avoid exposing it in public GitHub repositories.
        let GEMINI_API_KEY = localStorage.getItem('GEMINI_API_KEY') || ""; 
        
        let allCustomers = [];
        let allInventory = [];
        let aiLibrary = []; // NEW: Store Known Aliases
        let currentPartsOrder = [];
        let selectedCustomer = null;
        let pendingOrders = []; 
        const preferredModels = [
            'gemini-3.0-flash', 
            'gemini-2.5-flash', 
            'gemini-2.0-flash', 
            'gemini-1.5-flash', 
            'gemini-pro'
        ];
        let currentModelIndex = 0;
        let availableModel = preferredModels[0]; 

        // --- SELF-HEALING AI LOGIC ---
        async function checkAPIStatus() {
            const indicator = document.getElementById('ai-status-indicator');
            
            if (!GEMINI_API_KEY) {
                indicator.innerHTML = `❌ Connection Error: API Key Missing.<br>Check API Key & Permissions.`;
                indicator.className = "text-base font-mono p-2 bg-red-100 text-red-700 rounded mb-2";
                
                const newKey = prompt("API Key Missing or Invalid.\n\nPlease enter a valid Gemini API Key from Google AI Studio:");
                if (newKey) {
                    localStorage.setItem('GEMINI_API_KEY', newKey.trim());
                    GEMINI_API_KEY = newKey.trim();
                    setTimeout(checkAPIStatus, 500);
                }
            } else {
                availableModel = preferredModels[currentModelIndex];
                indicator.textContent = `✅ Ready. Using: ${availableModel}`;
                indicator.className = "text-base font-mono p-2 bg-green-100 text-green-700 rounded mb-2";
            }
        }

        async function processAIOrder(text) {
            if (!availableModel || !GEMINI_API_KEY) {
                // Try to reconnect if model isn't set
                await checkAPIStatus();
                if (!availableModel) return;
            }

            const customerListStr = allCustomers.map(c => c.searchName).join(', ');
            const inventoryListStr = allInventory.join(', ');
            const libraryStr = aiLibrary.join(', '); // Add Library to prompt

            const prompt = `
                You are a smart multi-order parser for a poultry business.
                Customers: [${customerListStr}]
                Inventory: [${inventoryListStr}]
                KNOWN ALIASES: [${libraryStr}]
                
                Current Date: ${new Date().toISOString().split('T')[0]} (Reference this if they say "tomorrow" or "today")

                Tasks:
                1. Identify the delivery date if mentioned (return as YYYY-MM-DD). If no date is mentioned, use today.
                2. Identify ALL distinct customers mentioned in the text. CRITICAL: Pay very close attention to "Area" or "Branch" numbers (e.g., "Tangkak 1", "Tangkak 2"). Do NOT merge them into one customer. Treat them as completely separate orders.
                3. For each distinct customer/branch, extract their specific order items.
                
                Return ONLY JSON as an object containing an array:
                {
                  "deliveryDate": "YYYY-MM-DD",
                  "orders": [
                    {
                      "customerName": "Exact match from Customers if possible",
                      "customerRemark": "Delivery notes",
                      "broiler": { "whole_qty": number, "whole_remark": "", "slices_qty": number, "slices_remark": "" },
                      "parts": [ { "name": "Best match from Inventory", "qty": number, "unit": "KG/Pack/PCS", "remark": "" } ],
                      "generalRemark": "Other notes"
                    }
                  ]
                }
                
                USER INPUT:
                ${text}
            `;

            let retries = 2; // For 503 errors only
            let lastError = null;

            while (currentModelIndex < preferredModels.length) {
                availableModel = preferredModels[currentModelIndex];
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${availableModel}:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    if (!response.ok) {
                        const errorMsg = `API Error: ${response.status}`;
                        if (response.status === 503 && retries > 0) {
                            console.warn("503 Service Unavailable, retrying...");
                            retries--;
                            await new Promise(r => setTimeout(r, 2000)); 
                            continue;
                        }
                        if (response.status === 429 || response.status === 403) {
                            console.warn(`429/403 Error on ${availableModel}. Hopping to next model...`);
                            currentModelIndex++;
                            const indicator = document.getElementById('ai-status-indicator');
                            if (indicator && preferredModels[currentModelIndex]) {
                                 indicator.textContent = `⚠️ Rate Limit. Switched to: ${preferredModels[currentModelIndex]}`;
                                 indicator.className = "text-base font-mono p-2 bg-yellow-100 text-yellow-700 rounded mb-2";
                            }
                            continue; // Skip standard loop wait and instantly hop to the next model
                        }
                        throw new Error(errorMsg);
                    }
                    
                    const data = await response.json();
                    
                    // Optional Check: Did we get a token usage report?
                    if (data.usageMetadata) {
                         const tokens = data.usageMetadata.totalTokenCount;
                         console.log(`Parsed using ${tokens} tokens on ${availableModel}`);
                    }
                    
                    let jsonText = data.candidates[0].content.parts[0].text;
                    jsonText = jsonText.replace(/```json|```/gi, '').trim();
                    return JSON.parse(jsonText);
                    
                } catch (err) {
                    lastError = err;
                    if (err.message.includes("503") && retries > 0) {
                        retries--;
                        await new Promise(r => setTimeout(r, 2000));
                        continue;
                    }
                    
                    // If it's a generic failed fetch (could be CORS or completely disabled key), try next model
                    currentModelIndex++;
                }
            }
            throw new Error(`All models exhausted. Last error: ${lastError.message}`);
        }

        // --- DOM Elements & Event Listeners ---
        const aiScanBtn = document.getElementById('ai-scan-btn');
        const aiModal = document.getElementById('ai-modal');
        const processAiBtn = document.getElementById('process-ai-btn');
        const aiInputText = document.getElementById('ai-input-text');
        const aiLoading = document.getElementById('ai-loading');

        aiScanBtn.addEventListener('click', () => {
            // Function disabled by hand as requested
            // document.getElementById('ai-input-text').value = ''; // NEW: Clear input field every time
            // aiModal.classList.remove('hidden');
            // if(!availableModel) checkAPIStatus(); 
        });

        document.getElementById('close-ai-modal').addEventListener('click', () => aiModal.classList.add('hidden'));

        processAiBtn.addEventListener('click', async () => {
            const text = aiInputText.value.trim();
            if (!text) return alert("Enter text.");
            
            aiLoading.classList.remove('hidden');
            processAiBtn.disabled = true;

            try {
                const result = await processAIOrder(text);
                const deliveryDate = result.deliveryDate || new Date().toISOString().split('T')[0];
                
                if (!result.orders || result.orders.length === 0) {
                    throw new Error("No orders could be identified.");
                }

                pendingOrders = [];
                
                result.orders.forEach(order => {
                    const custName = order.customerName;
                    const custData = allCustomers.find(c => c.searchName === custName || c.displayName === custName);
                    const finalCustName = custData ? custData.displayName : custName;

                    // Handle Broilers
                    if (order.broiler && (order.broiler.whole_qty > 0 || order.broiler.slices_qty > 0)) {
                        let broilerItems = [];
                        if (order.broiler.whole_qty > 0) broilerItems.push({ description: 'Broiler', qty: order.broiler.whole_qty, remark: order.broiler.whole_remark });
                        if (order.broiler.slices_qty > 0) broilerItems.push({ description: 'Slices', qty: order.broiler.slices_qty, remark: order.broiler.slices_remark });
                        
                        pendingOrders.push({
                            customerName: finalCustName,
                            customerRemark: order.customerRemark || "",
                            deliveryDate: deliveryDate,
                            productType: 'broiler',
                            status: 'pending',
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            broilers: broilerItems,
                            processedText: `${finalCustName}: ` + broilerItems.map(b => `${b.qty} ${b.description}`).join(', ')
                        });
                    }

                    // Handle Parts
                    if (order.parts && order.parts.length > 0) {
                        pendingOrders.push({
                            customerName: finalCustName,
                            customerRemark: order.customerRemark || "",
                            deliveryDate: deliveryDate,
                            productType: 'parts',
                            status: 'pending',
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            parts: order.parts,
                            processedText: `${finalCustName} Parts Order`
                        });
                    }
                });

                if (pendingOrders.length === 0) throw new Error("Parsed data was empty.");

                // If only 1 customer was found, populate the form as usual
                if (result.orders.length === 1) {
                    const single = result.orders[0];
                    document.getElementById('customer-search').value = single.customerName;
                    document.getElementById('customer-search').dispatchEvent(new Event('input'));
                    document.getElementById('customer-remark').value = single.customerRemark || "";
                    document.getElementById('delivery-date').value = deliveryDate;
                    document.getElementById('order-general-remark').value = single.generalRemark || "";
                    
                    if (single.broiler) {
                        document.getElementById('broiler-main-qty').value = single.broiler.whole_qty || "";
                        document.getElementById('broiler-main-remark').value = single.broiler.whole_remark || "";
                        document.getElementById('broiler-slices-qty').value = single.broiler.slices_qty || "";
                        document.getElementById('broiler-slices-remark').value = single.broiler.slices_remark || "";
                    }
                    
                    currentPartsOrder = [];
                    if (single.parts) {
                        single.parts.forEach(p => currentPartsOrder.push({ ...p, qty: parseFloat(p.qty) || 0 }));
                    }
                    renderPartsList();
                }

                // Show confirmation modal (skipping manual submit for multiple orders as requested)
                const listHtml = pendingOrders.map(o => `
                    <div class="border-b pb-2">
                        <div class="flex justify-between items-center text-xs text-blue-600 font-bold uppercase mb-1">
                            <span>${o.productType}</span>
                            <span>📅 ${o.deliveryDate}</span>
                        </div>
                        <strong>${o.customerName}</strong>: ${o.processedText}
                    </div>
                `).join('');
                
                document.getElementById('confirm-customer-text').textContent = result.orders.length > 1 ? "MULTIPLE ORDERS DETECTED" : pendingOrders[0].customerName;
                document.getElementById('confirm-product-list').innerHTML = listHtml;
                
                aiModal.classList.add('hidden');
                confirmationModal.classList.remove('hidden');
                showNotification(`AI identified ${result.orders.length} customers for ${deliveryDate}.`, 'success');

            } catch (e) {
                console.error(e);
                alert(`AI Parsing failed: ${e.message}`);
            } finally {
                aiLoading.classList.add('hidden');
                processAiBtn.disabled = false;
            }
        });

        const orderForm = document.getElementById('order-form');
        const notificationArea = document.getElementById('notification-area');
        const confirmationModal = document.getElementById('confirmation-modal');
        const partsOrderListDiv = document.getElementById('parts-order-list');

        function showNotification(msg, type) {
             notificationArea.innerHTML = `<div class="p-3 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${msg}</div>`;
            setTimeout(() => { notificationArea.innerHTML = ''; }, 4000);
        }

        async function loadData() {
            try {
                // Fetch Customers
                const customersSnapshot = await db.collection('customers').orderBy('name').get();
                allCustomers = customersSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), searchName: doc.data().description ? `${doc.data().displayName} (${doc.data().description})` : doc.data().displayName }));
                const dl = document.getElementById('customer-names-list');
                dl.innerHTML = '';
                allCustomers.forEach(c => dl.innerHTML += `<option value="${c.searchName}"></option>`);

                // Fetch Inventory
                const inventorySnapshot = await db.collection('inventory').orderBy('name').get();
                allInventory = inventorySnapshot.docs.map(doc => doc.data().displayName);
                const il = document.getElementById('item-names-list');
                il.innerHTML = '';
                allInventory.forEach(n => il.innerHTML += `<option value="${n}"></option>`);

                // NEW: Fetch AI Library
                const libSnapshot = await db.collection('ai_library').get();
                aiLibrary = libSnapshot.docs.map(doc => `"${doc.data().alias}"="${doc.data().correctName}"`);

                // Set default delivery date to tomorrow
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                document.getElementById('delivery-date').value = tomorrow.toISOString().split('T')[0];

            } catch (e) { console.error(e); }
        }

        document.getElementById('customer-search').addEventListener('input', (e) => {
            const found = allCustomers.find(c => c.searchName === e.target.value);
            selectedCustomer = found || null;
            document.getElementById('customer-tier-display').className = found ? "text-[17px] font-medium text-blue-500" : "hidden";
            if(found) document.getElementById('customer-tier-display').textContent = `Tier: ${found.priceTier || 'Wholesale'}`;
        });

        function renderPartsList() {
            partsOrderListDiv.innerHTML = currentPartsOrder.length ? '' : '<p class="text-gray-500 italic">No parts added.</p>';
            currentPartsOrder.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-start p-3 bg-white border rounded-lg shadow-sm mb-2';
                div.innerHTML = `<div><div class="font-semibold text-gray-800">${p.name} <span class="text-blue-600">(${p.qty} ${p.unit})</span></div>${p.remark ? `<div class="text-[17px] text-gray-500 italic">Note: ${p.remark}</div>` : ''}</div><button type="button" class="remove-part-btn bg-red-100 text-red-600 font-bold py-1 px-3 rounded text-[17px]" onclick="removePart(${i})">&times;</button>`;
                partsOrderListDiv.appendChild(div);
            });
        }
        window.removePart = (i) => { currentPartsOrder.splice(i, 1); renderPartsList(); };

        document.getElementById('add-part-btn').addEventListener('click', () => {
            const name = document.getElementById('part-name').value;
            const qty = parseFloat(document.getElementById('part-qty').value);
            const unit = document.getElementById('part-unit').value;
            const remark = document.getElementById('part-remark').value;
            if(!name || isNaN(qty)) return showNotification('Invalid part details', 'error');
            currentPartsOrder.push({ name, qty, unit, remark });
            renderPartsList();
            document.getElementById('part-name').value = '';
            document.getElementById('part-qty').value = '';
            document.getElementById('part-remark').value = '';
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            orderForm.reset();
            currentPartsOrder = [];
            renderPartsList();
            selectedCustomer = null;
            document.getElementById('customer-tier-display').className = "hidden";
            // Re-set default delivery date to tomorrow
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('delivery-date').value = tomorrow.toISOString().split('T')[0];
        });

        orderForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const rawCustomer = document.getElementById('customer-search').value.trim();
            if(!rawCustomer) {
                showNotification('Please select or enter a customer name first!', 'error');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            if(!selectedCustomer && !confirm("Customer not selected/matched. Proceed with raw text?")) return;
            
            pendingOrders = [];
            const customerName = selectedCustomer ? selectedCustomer.displayName : document.getElementById('customer-search').value;
            const customerRemark = document.getElementById('customer-remark').value;
            const deliveryDate = document.getElementById('delivery-date').value || new Date().toISOString().split('T')[0];
            const generalRemark = document.getElementById('order-general-remark').value;
            
            const wholeQty = parseInt(document.getElementById('broiler-main-qty').value) || 0;
            const wholeRemark = document.getElementById('broiler-main-remark').value;
            const slicesQty = parseInt(document.getElementById('broiler-slices-qty').value) || 0;
            const slicesRemark = document.getElementById('broiler-slices-remark').value;

            let broilerItems = [];
            if (wholeQty > 0) broilerItems.push({ description: 'Broiler', qty: wholeQty, remark: wholeRemark });
            if (slicesQty > 0) broilerItems.push({ description: 'Slices', qty: slicesQty, remark: slicesRemark });

            if(broilerItems.length > 0) {
                pendingOrders.push({
                    customerName, 
                    customerRemark,
                    deliveryDate,
                    productType: 'broiler', 
                    status: 'pending', 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    broilers: broilerItems, 
                    processedText: `${customerName}: ` + broilerItems.map(b => `${b.qty} ${b.description}`).join(', ')
                });
            }

            if(currentPartsOrder.length > 0) {
                pendingOrders.push({
                    customerName, 
                    customerRemark,
                    deliveryDate,
                    productType: 'parts', 
                    status: 'pending', 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    parts: currentPartsOrder, 
                    processedText: `${customerName} Parts Order`
                });
            }

            if(pendingOrders.length === 0) return showNotification('Order is empty', 'error');
            
            const listHtml = pendingOrders.map(o => `<div class="border-b pb-2"><strong>${o.productType.toUpperCase()}</strong>: ${o.processedText}</div>`).join('');
            document.getElementById('confirm-customer-text').textContent = customerName;
            document.getElementById('confirm-product-list').innerHTML = listHtml;
            confirmationModal.classList.remove('hidden');
        });

        document.getElementById('modal-edit-btn').addEventListener('click', () => confirmationModal.classList.add('hidden'));
        document.getElementById('modal-confirm-btn').addEventListener('click', async () => {
            const btn = document.getElementById('modal-confirm-btn');
            btn.disabled = true; btn.textContent = 'Submitting...';
            try {
                await Promise.all(pendingOrders.map(o => db.collection('orders').add(o)));
                showNotification('Saved!', 'success');
                confirmationModal.classList.add('hidden');
                document.getElementById('clear-btn').click();
            } catch(e) { showNotification('Error saving', 'error'); }
            finally { btn.disabled = false; btn.textContent = 'Submit'; }
        });

        function updateHeaderDate() {
            const dateEl = document.getElementById('header-today-date');
            if (dateEl) {
                const now = new Date();
                const d = String(now.getDate()).padStart(2, '0');
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const y = now.getFullYear();
                dateEl.textContent = `${d}/${m}/${y}`;
            }
        }
        document.addEventListener('DOMContentLoaded', updateHeaderDate);

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
