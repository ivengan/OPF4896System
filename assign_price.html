<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Pricing - Multi-Function System</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="/icons/icon-192.png">
    <style>

</head>
<body class="bg-gray-100">
<script>
    // Session Gatekeeper
    const loginExpiry = localStorage.getItem('loginExpiry');
    if (!loginExpiry || Date.now() >= parseInt(loginExpiry)) {
        localStorage.removeItem('loginExpiry');
        window.location.href = '/index.html';
    }
</script>

    <header class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-4">
                    <a href="dashboard2.html" class="text-blue-600 font-bold whitespace-nowrap hover:text-blue-800 inline-flex items-center gap-1">&larr; back</a>
                    <h1 class="text-2xl font-bold text-gray-800">Assign Pricing</h1>
                </div>
                <button id="logout-btn" class="bg-red-500 text-white font-semibold py-2 px-4 rounded-lg hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition">Logout</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <div id="notification-area" class="mb-6"></div>

        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-3xl font-bold text-gray-900 mb-4">Assign Price to Customers</h2>
            <div id="customer-tier-list" class="space-y-4">
                </div>
        </div>

        <div class="mt-8 bg-white p-6 rounded-lg shadow">
            <h2 class="text-3xl font-bold text-gray-900 mb-4">Special Price Overrides</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
                <input list="customer-names-list" id="sp-cust-name" placeholder="Customer Name" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500">
                <input list="item-names-list" id="sp-item-name" placeholder="Item Name" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500">
                <input type="number" id="sp-price" placeholder="Special Price (RM)" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex justify-end mt-4">
                <button id="sp-confirm-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-lg">CONFIRM</button>
            </div>
            
            <datalist id="customer-names-list"></datalist>
            <datalist id="item-names-list"></datalist>

            <div id="special-price-list" class="mt-6">
                </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQAKliT1QN8H-FOuNzvUGArbyQfM_U5MA",
            authDomain: "opf4896system.firebaseapp.com",
            projectId: "opf4896system",
            storageBucket: "opf4896system.appspot.com",
            messagingSenderId: "150864121707",
            appId: "1:150864121707:web:b3161a86514c1d86dd062e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- DOM References ---
        const customerTierListDiv = document.getElementById('customer-tier-list');
        const spCustNameInput = document.getElementById('sp-cust-name');
        const spItemNameInput = document.getElementById('sp-item-name');
        const spPriceInput = document.getElementById('sp-price');
        const spConfirmBtn = document.getElementById('sp-confirm-btn');
        const specialPriceListDiv = document.getElementById('special-price-list');
        const customerDatalist = document.getElementById('customer-names-list');
        const itemDatalist = document.getElementById('item-names-list');
        const notificationArea = document.getElementById('notification-area');
        
        let allCustomers = [];

        function showNotification(message, type) {
            notificationArea.innerHTML = `<div class="p-3 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${message}</div>`;
            setTimeout(() => { notificationArea.innerHTML = ''; }, 4000);
        }

        async function loadData() {
            try {
                const [customersSnapshot, pricesDoc] = await Promise.all([
                    db.collection('customers').orderBy('lorry').orderBy('name').get(),
                    db.collection('config').doc('pricing').get()
                ]);

                allCustomers = customersSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                displayCustomerTiers(allCustomers);
                displaySpecialPrices(allCustomers);
                populateDatalists(allCustomers, pricesDoc.data());

            } catch (error) {
                console.error("Error loading data:", error);
                showNotification('Error loading page data. Ensure Firestore indexes are built.', 'error');
            }
        }
        
        function populateDatalists(customers, prices) {
            customerDatalist.innerHTML = '';
            customers.forEach(cust => {
                customerDatalist.innerHTML += `<option value="${cust.displayName}"></option>`;
            });

            itemDatalist.innerHTML = '';
            if (prices) {
                if(prices.broiler_wholesale !== undefined) itemDatalist.innerHTML += `<option value="Wholesale"></option>`;
                if(prices.broiler_msrp !== undefined) itemDatalist.innerHTML += `<option value="MSRP"></option>`;
                if(prices.broiler_slices !== undefined) itemDatalist.innerHTML += `<option value="Slices"></option>`;
                if (prices.parts) {
                    Object.keys(prices.parts).forEach(partName => {
                        itemDatalist.innerHTML += `<option value="${partName}"></option>`;
                    });
                }
            }
        }

        function displayCustomerTiers(customers) {
            customerTierListDiv.innerHTML = '';
            const groupedByLorry = customers.reduce((acc, customer) => {
                (acc[customer.lorry] = acc[customer.lorry] || []).push(customer);
                return acc;
            }, {});

            const lorryOrder = ['JUQ 5168', 'JWP 9168', 'JXK 3168', 'JJJ 9528', 'None'];
            lorryOrder.forEach(lorry => {
                if (groupedByLorry[lorry]) {
                    const groupContainer = document.createElement('div');
                    groupContainer.innerHTML = `<h3 class="font-bold text-lg text-gray-700">${lorry}</h3>`;
                    const listContainer = document.createElement('div');
                    listContainer.className = 'bg-white rounded-lg shadow-sm overflow-hidden mt-2';
                    
                    groupedByLorry[lorry].forEach(customer => {
                        const custDiv = document.createElement('div');
                        // NEW COMPACT LAYOUT
                        custDiv.className = 'flex justify-between items-center p-3 border-b border-gray-200';
                        
                        const priceTiers = ['Wholesale', 'MSRP', 'Slices', 'Cash buy'];
                        const optionsHTML = priceTiers.map(tier => 
                            `<option value="${tier}" ${customer.priceTier === tier ? 'selected' : ''}>${tier}</option>`
                        ).join('');

                        custDiv.innerHTML = `
                            <div class="flex-grow">
                                <p class="font-semibold text-gray-800">${customer.displayName}</p>
                                <p class="text-sm text-gray-500">${customer.description || ''}</p>
                            </div>
                            <div class="flex-shrink-0 ml-4">
                                <select data-cust-id="${customer.id}" class="tier-select w-full sm:w-auto border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                                    ${optionsHTML}
                                </select>
                            </div>
                        `;
                        listContainer.appendChild(custDiv);
                    });
                    groupContainer.appendChild(listContainer);
                    customerTierListDiv.appendChild(groupContainer);
                }
            });
        }
        
        // CORRECTED LOGIC for displaying ONLY special prices
        function displaySpecialPrices(customers) {
            specialPriceListDiv.innerHTML = '<h3 class="text-lg font-bold text-gray-900 mt-6">Recorded Special Prices</h3>';
            let hasSpecialPrices = false;
            const listContainer = document.createElement('div');
            listContainer.className = 'bg-white rounded-lg shadow-sm overflow-hidden mt-2';

            customers.forEach(customer => {
                if (customer.specialPrices && Object.keys(customer.specialPrices).length > 0) {
                    hasSpecialPrices = true;
                    Object.entries(customer.specialPrices).forEach(([itemName, price]) => {
                        const spDiv = document.createElement('div');
                        spDiv.className = 'flex justify-between items-center p-3 border-b border-gray-200';
                        spDiv.innerHTML = `
                            <div>
                                <p class="font-semibold text-gray-800">${customer.displayName}</p>
                                <p class="text-sm text-gray-500">${itemName} @ RM ${price.toFixed(2)}</p>
                            </div>
                            <button data-cust-id="${customer.id}" data-item-name="${itemName}" class="del-sp-btn bg-red-500 hover:bg-red-600 text-white font-bold py-1 px-3 rounded-lg">DEL</button>
                        `;
                        listContainer.appendChild(spDiv);
                    });
                }
            });

            if (!hasSpecialPrices) {
                listContainer.innerHTML = '<p class="p-4 text-gray-500">No special prices have been set.</p>';
            }
            specialPriceListDiv.appendChild(listContainer);
        }

        document.addEventListener('DOMContentLoaded', loadData);

        customerTierListDiv.addEventListener('change', async (e) => {
            if (e.target.classList.contains('tier-select')) {
                const customerId = e.target.dataset.custId;
                const newTier = e.target.value;
                try {
                    await db.collection('customers').doc(customerId).update({ priceTier: newTier });
                    showNotification('Price tier updated!', 'success');
                    // No reload needed, as this section is self-contained.
                } catch (error) {
                    showNotification('Error updating price tier.', 'error');
                }
            }
        });
        
        spConfirmBtn.addEventListener('click', async () => {
            const custName = spCustNameInput.value;
            const itemName = spItemNameInput.value;
            const price = parseFloat(spPriceInput.value);

            const customer = allCustomers.find(c => c.displayName === custName);
            if (!customer) {
                showNotification(`Customer "${custName}" not found.`, 'error');
                return;
            }
            if (!itemName || isNaN(price)) {
                showNotification('Please enter a valid item name and price.', 'error');
                return;
            }

            try {
                await db.collection('customers').doc(customer.id).set({
                    specialPrices: { [itemName]: price }
                }, { merge: true });
                showNotification(`Special price for ${itemName} set for ${custName}.`, 'success');
                spCustNameInput.value = '';
                spItemNameInput.value = '';
                spPriceInput.value = '';
                loadData();
            } catch (error) {
                 showNotification('Error setting special price.', 'error');
            }
        });
        
        specialPriceListDiv.addEventListener('click', async (e) => {
            const delButton = e.target.closest('.del-sp-btn');
            if (delButton) {
                const customerId = delButton.dataset.custId;
                const itemName = delButton.dataset.itemName;

                if (confirm(`Are you sure you want to remove the special price for "${itemName}"?`)) {
                    try {
                        await db.collection('customers').doc(customerId).update({
                            [`specialPrices.${itemName}`]: firebase.firestore.FieldValue.delete()
                        });
                        showNotification('Special price removed.', 'success');
                        loadData();
                    } catch (error) {
                        showNotification('Error removing special price.', 'error');
                    }
                }
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
		localStorage.removeItem('loginExpiry'); // Clear the session
            window.location.href = '/index.html';
        });
    </script>
</body>
</html>
