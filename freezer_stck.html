<body class="bg-gray-100 font-sans text-gray-800 text-[17px] leading-relaxed">

    <script> 
        const loginExpiry = localStorage.getItem('loginExpiry');
        if (!loginExpiry || Date.now() >= parseInt(loginExpiry)) {
            localStorage.removeItem('loginExpiry');
            window.location.href = 'index.html';
        }
    </script>

    <header class="bg-white shadow-md sticky top-0 z-20">
         <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
             <div class="flex justify-between items-center min-h-16 py-2">
                 <div class="flex items-center gap-4">
                     <a href="dashboard.html" class="text-blue-600 font-bold whitespace-nowrap hover:text-blue-800 inline-flex items-center gap-1">&larr; back</a>
                     <h1 class="text-xl font-bold text-gray-900 tracking-tight sm:">Freezer Stock</h1>
                 </div>
             </div>
         </div>
    </header>

    <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        
        <div class="mb-4 flex justify-between items-center">
            <h2 class="text-xl font-bold text-gray-900 tracking-tight">Parts Inventory Ledger</h2>
            <span class="text-[17px] font-semibold text-blue-600 bg-blue-100 px-3 py-1 rounded-full" id="date-display"></span>
        </div>

        <div class="table-container overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead>
                    <tr>
                        <th class="text-center font-extrabold">ITEMS</th>
                        <th class="text-center font-extrabold">OPENING</th>
                        <th class="text-center font-extrabold text-red-600">OUT (lama)</th>
                        <th class="text-center font-extrabold text-green-600">IN (lama)</th>
                        <th class="text-center font-extrabold text-red-600">OUT (new)</th>
                        <th class="text-center font-extrabold text-green-600">IN (new)</th>
                        <th class="text-center font-extrabold text-blue-700 border-l border-gray-200">CLOSING</th>
                    </tr>
                </thead>
                <tbody id="inventory-tbody" class="divide-y divide-gray-200">
                    <tr>
                        <td colspan="7" class="text-center text-gray-500 font-normal py-8 bg-white">Loading inventory data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQAKliT1QN8H-FOuNzvUGArbyQfM_U5MA",
            authDomain: "opf4896system.firebaseapp.com",
            projectId: "opf4896system",
            storageBucket: "opf4896system.appspot.com",
            messagingSenderId: "150864121707",
            appId: "1:150864121707:web:b3161a86514c1d86dd062e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Enable offline persistence
        db.enablePersistence().catch(function(err) {
            if (err.code == 'failed-precondition') console.warn('Persistence failed: Multiple tabs open.');
            else if (err.code == 'unimplemented') console.warn('Persistence failed: Browser not supported.');
        });

        // Set Date to DD/MM/YYYY format
        const tDate = new Date();
        const dd = String(tDate.getDate()).padStart(2, '0');
        const mm = String(tDate.getMonth() + 1).padStart(2, '0');
        const yyyy = tDate.getFullYear();
        document.getElementById('date-display').textContent = `${dd}/${mm}/${yyyy}`;

        let rawStockData = [];
        let rawOrderData = [];
        let rawInventoryData = []; 

        function formatItemName(name, pack) {
            let itemName = (name || 'Unknown').trim();
            
            // Replacements: whole leg -> W/Leg, keping -> pcs
            itemName = itemName.replace(/whole leg/gi, 'W/Leg');
            itemName = itemName.replace(/keping/gi, 'pcs');
            
            // Title Case: Capitalize first letter of each word
            itemName = itemName.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
            
            let packStr = (pack || '').trim();
            if (!packStr || packStr === 'No pack = 0KG' || packStr === 'KG') return itemName;
            
            if (itemName.toLowerCase().includes(packStr.toLowerCase())) return itemName;
            
            if (packStr.toLowerCase().includes('pack')) return `${itemName} ${packStr}`;
            return `${itemName} ${packStr}/pack`;
        }

        // Display '-' instead of 0.00 KG
        function formatVal(val) {
            if (val === 0 || Math.abs(val) < 0.001) return '-';
            return val.toFixed(2) + ' KG';
        }

        function processInventory() {
            let inventoryMap = {};

            const today = new Date();
            today.setHours(0, 0, 0, 0); 

            function getOrInit(name) {
                if (!inventoryMap[name]) {
                    inventoryMap[name] = { name: name, opening: 0, inLama: 0, outLama: 0, inNew: 0, outNew: 0, closing: 0 };
                }
                return inventoryMap[name];
            }

            // 0. PRE-LOAD ALL REGISTERED INVENTORY ITEMS (From edit_inv.html)
            rawInventoryData.forEach(data => {
                let name = data.itemName || data.name || data.partName || data.description || '';
                let pack = data.packSize || data.unit || data.pack || '';
                if (name) {
                    getOrInit(formatItemName(name, pack));
                }
            });

            // 1. Process Stock IN (From stock_entries)
            rawStockData.forEach(data => {
                if (data.category !== 'Parts') return;

                let dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
                let isToday = dateObj >= today;
                let qty = parseFloat(data.netWeight) || 0;

                let rawName = data.categoryDetails?.partName || data.category || 'Unknown Part';
                let pack = data.categoryDetails?.packSize || '';
                let itemName = formatItemName(rawName, pack);

                let remark = (data.remark || '').toLowerCase();
                let isLama = remark.includes('lama') || remark.includes('kopek') || remark.includes('sisa');

                let item = getOrInit(itemName);

                if (!isToday) {
                    item.opening += qty; 
                } else {
                    if (isLama) item.inLama += qty;
                    else item.inNew += qty;
                }
            });

            // 2. Process Dispatches OUT (From orders)
            rawOrderData.forEach(data => {
                if (data.parts && Array.isArray(data.parts)) {
                    data.parts.forEach(p => {
                        let rawName = p.name || 'Unknown Part';
                        let packMatch = rawName.match(/(\d+(?:\.\d+)?)\s*kg/i);
                        let packStr = packMatch ? `${packMatch[1]} KG` : '';
                        let itemName = formatItemName(rawName.replace(packMatch ? packMatch[0] : '', '').trim(), packStr);

                        if (p.history && Array.isArray(p.history)) {
                            p.history.forEach(h => {
                                let hDate = h.timestamp ? new Date(h.timestamp) : new Date();
                                let isToday = hDate >= today;
                                let qty = parseFloat(h.net) || 0; 
                                let isLama = h.ayamLama === true;

                                let item = getOrInit(itemName);

                                if (!isToday) {
                                    item.opening -= qty;
                                } else {
                                    if (isLama) item.outLama += qty;
                                    else item.outNew += qty;
                                }
                            });
                        }
                    });
                }
            });

            // 3. Render Table
            const tbody = document.getElementById('inventory-tbody');
            tbody.innerHTML = '';

            // Convert Map to Array and sort Alphabetically
            let itemsArray = Object.values(inventoryMap);
            itemsArray.sort((a, b) => a.name.localeCompare(b.name));

            if (itemsArray.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-gray-500 font-normal py-8 bg-white">No inventory items recorded.</td></tr>';
                return;
            }

            itemsArray.forEach(item => {
                // Formula: OPENING + IN(lama) + IN(new) - OUT(lama) - OUT(new)
                item.closing = item.opening + item.inLama + item.inNew - item.outLama - item.outNew;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="text-left font-extrabold text-gray-800 whitespace-nowrap">${item.name}</td>
                    <td class="text-center text-gray-600 whitespace-nowrap">${formatVal(item.opening)}</td>
                    <td class="text-center text-red-500 whitespace-nowrap">${formatVal(item.outLama)}</td>
                    <td class="text-center text-green-600 whitespace-nowrap">${formatVal(item.inLama)}</td>
                    <td class="text-center text-red-500 whitespace-nowrap">${formatVal(item.outNew)}</td>
                    <td class="text-center text-green-600 whitespace-nowrap">${formatVal(item.inNew)}</td>
                    <td class="text-center font-extrabold text-blue-700 bg-blue-50 border-l border-gray-200 whitespace-nowrap">${formatVal(item.closing)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- REAL-TIME LISTENERS ---

        db.collection('inventory').onSnapshot(snap => {
            rawInventoryData = snap.docs.map(d => d.data());
            processInventory();
        }, err => {
            console.log("Checking alternative inventory collection name...");
            db.collection('inventory_items').onSnapshot(snap2 => {
                rawInventoryData = snap2.docs.map(d => d.data());
                processInventory();
            });
        });

        db.collection('stock_entries').onSnapshot(snap => {
            rawStockData = snap.docs.map(d => d.data());
            processInventory();
        });

        db.collection('orders').where('productType', '==', 'parts').onSnapshot(snap => {
            rawOrderData = snap.docs.map(d => d.data());
            processInventory();
        });
    </script>
</body>
