<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Client Orders</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); }
        .order-card { transition: all 0.2s ease; }
        .order-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased min-h-screen pb-20">

    <script>
        // Simple expiry check to match standard admin pages
        if (!localStorage.getItem('loginExpiry') || Date.now() >= parseInt(localStorage.getItem('loginExpiry'))) {
            localStorage.removeItem('loginExpiry'); window.location.href = 'index.html';
        }
    </script>

    <header class="bg-white shadow-md sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center gap-4">
                    <a href="dashboard.html" class="text-blue-600 font-bold whitespace-nowrap hover:text-blue-800 flex items-center gap-1">&larr; Back</a>
                    <div class="flex flex-col">
                        <h1 class="text-xl font-bold text-gray-900 tracking-tight">Approve Client Orders</h1>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Date Sub-Header -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-2 bg-gray-50 border-b border-gray-200">
        <div id="header-today-date" style="font-weight: bold; font-size: 12px; color: #6b7281; text-transform: uppercase; letter-spacing: 0.05em;"></div>
    </div>

    <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        
        <div id="notification-area" class="mb-4"></div>

        <!-- Filter / Utility Bar -->
        <div class="bg-white rounded-lg shadow-sm border p-4 mb-6 flex justify-between items-center">
            <h2 class="font-bold text-lg text-gray-800" id="pending-count">Loading unapproved orders...</h2>
        </div>

        <div id="pending-orders-list" class="space-y-6">
            <!-- Dynamic Content -->
        </div>

    </main>

    <!-- Reject/Delete Verification Modal -->
    <div id="modal-reject" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 text-center">
            <h2 class="text-xl font-bold text-gray-900 mb-2">Reject Order?</h2>
            <p class="text-gray-600 mb-6 text-sm">This will permanently delete the order request from the client.</p>
            <div class="flex gap-3">
                <button id="btn-cancel-reject" class="flex-1 bg-gray-200 text-gray-800 font-bold py-3 rounded-xl hover:bg-gray-300">Cancel</button>
                <button id="btn-confirm-reject" class="flex-1 bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700 shadow-md">Reject</button>
            </div>
        </div>
    </div>

    <!-- Edit Order Modal (Universal) -->
    <div id="modal-edit-order" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4 overflow-y-auto pt-20">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 my-auto relative">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h2 class="text-xl font-bold text-gray-900" id="edit-modal-title">Edit Order</h2>
                <button onclick="closeModal('modal-edit-order')" class="text-gray-500 hover:text-gray-700 font-bold text-2xl">&times;</button>
            </div>
            
            <div id="edit-content-area" class="space-y-4 mb-6">
                <!-- Dynamically populated based on order type (Broiler vs Parts) -->
            </div>

            <div class="border-t pt-4">
                <button id="btn-save-edit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition">Save Changes</button>
            </div>
        </div>
    </div>


    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQAKliT1QN8H-FOuNzvUGArbyQfM_U5MA",
            authDomain: "opf4896system.firebaseapp.com",
            projectId: "opf4896system",
            storageBucket: "opf4896system.firebasestorage.app",
            messagingSenderId: "150864121707",
            appId: "1:150864121707:web:b3161a86514c1d86dd062e"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        db.enablePersistence({ synchronizeTabs: true }).catch(err => console.log('Offline persistence error:', err.code));

        let unapprovedOrders = [];
        let orderToDeleteId = null;
        let orderToEdit = null;
        
        function showNotify(msg, type) {
            const area = document.getElementById('notification-area');
            area.innerHTML = `<div class="p-3 rounded-lg text-center font-bold text-[17px] ${type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${msg}</div>`;
            setTimeout(() => { area.innerHTML = ''; }, 3000);
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }

        // Fetch unapproved orders
        db.collection('orders').where('status', '==', 'unapproved').onSnapshot(snapshot => {
            unapprovedOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderOrders();
        }, err => {
            console.error(err);
            document.getElementById('pending-count').textContent = "Error loading orders.";
            document.getElementById('pending-count').classList.add('text-red-500');
        });

        function renderOrders() {
            const listEl = document.getElementById('pending-orders-list');
            const countEl = document.getElementById('pending-count');
            
            listEl.innerHTML = '';
            
            if (unapprovedOrders.length === 0) {
                countEl.textContent = "0 Unapproved Orders";
                listEl.innerHTML = `
                    <div class="bg-white rounded-2xl shadow p-12 text-center border-dashed border-2 border-gray-300">
                        <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        <h3 class="mt-2 text-sm font-semibold text-gray-900">All caught up</h3>
                        <p class="mt-1 text-sm text-gray-500">No pending client requests require approval.</p>
                    </div>`;
                return;
            }

            countEl.textContent = `${unapprovedOrders.length} Unapproved Order(s)`;

            // Group by Date for cleaner UI
            const groups = {};
            unapprovedOrders.forEach(o => {
                const d = o.deliveryDate || 'Unknown Date';
                if (!groups[d]) groups[d] = [];
                groups[d].push(o);
            });

            // Render groups
            Object.keys(groups).sort().forEach(dateStr => {
                const dateHeader = document.createElement('h3');
                dateHeader.className = "font-bold text-gray-500 mt-6 mb-2 uppercase tracking-wide text-sm";
                dateHeader.textContent = `Delivery: ${dateStr}`;
                listEl.appendChild(dateHeader);

                groups[dateStr].forEach(order => {
                    const card = createOrderCard(order);
                    listEl.appendChild(card);
                });
            });
        }

        function createOrderCard(order) {
            const div = document.createElement('div');
            div.className = "order-card bg-white rounded-xl shadow-sm border border-gray-200 p-5 flex flex-col md:flex-row gap-4 justify-between items-start md:items-center";

            let detailsHtml = '';
            let productTag = order.productType.toUpperCase();
            let tagColor = order.productType === 'broiler' ? 'bg-orange-100 text-orange-800 border-orange-200' : 'bg-blue-100 text-blue-800 border-blue-200';

            if (order.productType === 'broiler' && order.broilers) {
                order.broilers.forEach(b => {
                    detailsHtml += `<div class="font-medium">• ${b.qty}x ${b.description} ${b.remark ? `<span class="text-gray-400 text-sm">(${b.remark})</span>` : ''}</div>`;
                });
            } else if (order.productType === 'parts' && order.parts) {
                order.parts.forEach(p => {
                    detailsHtml += `<div class="font-medium">• ${p.qty}${p.unit} ${p.name} ${p.remark ? `<span class="text-gray-400 text-sm">(${p.remark})</span>` : ''}</div>`;
                });
            }

            div.innerHTML = `
                <div class="flex-1 w-full">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="px-2 py-0.5 rounded text-xs font-bold border ${tagColor}">${productTag}</span>
                        ${order.source === 'b2b_portal' ? `<span class="px-2 py-0.5 rounded text-xs font-bold bg-green-100 text-green-800 border border-green-200 whitespace-nowrap">Portal Client</span>` : ''}
                        <span class="text-xs text-gray-400 ml-auto whitespace-nowrap">${new Date(order.timestamp?.toDate() || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900 mb-1">${order.customerName}</h3>
                    <div class="text-gray-700 bg-gray-50 rounded p-3 text-sm border">
                        ${detailsHtml}
                        ${order.customerRemark ? `<div class="mt-2 pt-2 border-t border-gray-200 text-indigo-600 italic">" ${order.customerRemark} "</div>` : ''}
                    </div>
                </div>
                
                <div class="flex flex-row md:flex-col gap-2 w-full md:w-auto h-full justify-end mt-4 md:mt-0">
                    <button class="flex-1 md:flex-none btn-edit bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold px-4 py-2 rounded-lg border shadow-sm transition whitespace-nowrap" data-id="${order.id}">Edit Items</button>
                    <button class="flex-1 md:flex-none btn-approve bg-green-500 hover:bg-green-600 text-white font-bold px-6 py-2 rounded-lg shadow-sm transition whitespace-nowrap" data-id="${order.id}">APPROVE</button>
                    <button class="flex-none btn-reject bg-red-100 hover:bg-red-200 text-red-600 font-bold px-3 py-2 rounded-lg border border-red-200 shadow-sm transition" data-id="${order.id}">
                        <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `;

            // Event Listeners
            div.querySelector('.btn-approve').addEventListener('click', () => approveOrder(order.id));
            div.querySelector('.btn-reject').addEventListener('click', () => {
                orderToDeleteId = order.id;
                openModal('modal-reject');
            });
            div.querySelector('.btn-edit').addEventListener('click', () => prepareEdit(order));

            return div;
        }

        // --- Approve ---
        async function approveOrder(id) {
            try {
                await db.collection('orders').doc(id).update({ status: 'pending' });
                showNotify("Order Approved & sent to Dispatch", "success");
            } catch(e) {
                console.error(e);
                showNotify("Failed to approve order", "error");
            }
        }

        // --- Reject ---
        document.getElementById('btn-cancel-reject').addEventListener('click', () => {
            orderToDeleteId = null;
            closeModal('modal-reject');
        });
        
        document.getElementById('btn-confirm-reject').addEventListener('click', async () => {
            if (!orderToDeleteId) return;
            try {
                await db.collection('orders').doc(orderToDeleteId).delete();
                showNotify("Order Rejected & Deleted", "success");
                closeModal('modal-reject');
            } catch(e) {
                showNotify("Failed to delete order", "error");
            }
        });

        // --- Edit Logic ---
        function prepareEdit(order) {
            orderToEdit = JSON.parse(JSON.stringify(order)); // deep copy
            document.getElementById('edit-modal-title').textContent = `Edit Order: ${order.customerName}`;
            
            const area = document.getElementById('edit-content-area');
            area.innerHTML = '';
            
            // Client Remark
            area.innerHTML += `
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">General Remark</label>
                    <input type="text" id="edit-general-remark" class="w-full border p-2 rounded focus:border-blue-500 outline-none" value="${orderToEdit.customerRemark || ''}">
                </div>
                <hr class="my-4">
            `;

            if (orderToEdit.productType === 'broiler') {
                orderToEdit.broilers.forEach((b, i) => {
                    area.innerHTML += `
                        <div class="bg-gray-50 border p-3 rounded mb-2">
                            <h4 class="font-bold text-gray-800 mb-2">${b.description}</h4>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-xs font-bold text-gray-500">Qty</label>
                                    <input type="number" class="w-full border p-2 rounded broiler-qty-input" data-index="${i}" value="${b.qty}">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-gray-500">Remark</label>
                                    <input type="text" class="w-full border p-2 rounded broiler-rem-input" data-index="${i}" value="${b.remark || ''}">
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else if (orderToEdit.productType === 'parts') {
                orderToEdit.parts.forEach((p, i) => {
                    area.innerHTML += `
                        <div class="bg-gray-50 border p-3 rounded mb-2">
                            <h4 class="font-bold text-gray-800 mb-2">${p.name}</h4>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="col-span-1">
                                    <label class="block text-xs font-bold text-gray-500">Qty</label>
                                    <input type="number" step="0.5" class="w-full border p-2 rounded parts-qty-input" data-index="${i}" value="${p.qty}">
                                </div>
                                <div class="col-span-1">
                                    <label class="block text-xs font-bold text-gray-500">Unit</label>
                                    <select class="w-full border p-2 rounded parts-unit-input" data-index="${i}">
                                        <option value="KG" ${p.unit === 'KG' ? 'selected' : ''}>KG</option>
                                        <option value="BAG" ${p.unit === 'BAG' ? 'selected' : ''}>BAG</option>
                                    </select>
                                </div>
                                <div class="col-span-3">
                                    <label class="block text-xs font-bold text-gray-500">Remark</label>
                                    <input type="text" class="w-full border p-2 rounded parts-rem-input" data-index="${i}" value="${p.remark || ''}">
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            openModal('modal-edit-order');
        }

        document.getElementById('btn-save-edit').addEventListener('click', async () => {
            if (!orderToEdit) return;
            const btn = document.getElementById('btn-save-edit');
            btn.disabled = true; btn.textContent = "Saving...";

            try {
                const newGeneralRem = document.getElementById('edit-general-remark').value.trim();
                let updateData = { customerRemark: newGeneralRem };

                if (orderToEdit.productType === 'broiler') {
                    const qtyInputs = document.querySelectorAll('.broiler-qty-input');
                    const remInputs = document.querySelectorAll('.broiler-rem-input');
                    
                    let newBroilers = [...orderToEdit.broilers];
                    qtyInputs.forEach(el => newBroilers[el.dataset.index].qty = parseInt(el.value) || 0);
                    remInputs.forEach(el => newBroilers[el.dataset.index].remark = el.value.trim());
                    
                    updateData.broilers = newBroilers;
                    updateData.processedText = newBroilers.map(b => `${b.qty} ${b.description}`).join(', ');
                } 
                else if (orderToEdit.productType === 'parts') {
                    const qtyInputs = document.querySelectorAll('.parts-qty-input');
                    const unitInputs = document.querySelectorAll('.parts-unit-input');
                    const remInputs = document.querySelectorAll('.parts-rem-input');

                    let newParts = [...orderToEdit.parts];
                    qtyInputs.forEach(el => newParts[el.dataset.index].qty = parseFloat(el.value) || 0);
                    unitInputs.forEach(el => newParts[el.dataset.index].unit = el.value);
                    remInputs.forEach(el => newParts[el.dataset.index].remark = el.value.trim());

                    updateData.parts = newParts;
                }

                await db.collection('orders').doc(orderToEdit.id).update(updateData);
                showNotify("Order details updated.", "success");
                closeModal('modal-edit-order');
            }
            catch (e) {
                console.error(e);
                alert("Failed to save changes.");
            } finally {
                btn.disabled = false; btn.textContent = "Save Changes";
            }
        });

        function updateHeaderDate() {
            const dateEl = document.getElementById('header-today-date');
            if (dateEl) {
                const now = new Date();
                const d = String(now.getDate()).padStart(2, '0');
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const y = now.getFullYear();
                dateEl.textContent = `${d}/${m}/${y}`;
            }
        }
        document.addEventListener('DOMContentLoaded', updateHeaderDate);
    </script>
</body>
</html>
