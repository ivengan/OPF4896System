<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal - Submit Order</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="pwa-install.js" defer></script>
    <style>
        .hidden { display: none !important; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); }
        @keyframes popIn { 
            0% { transform: scale(0.9); opacity: 0; } 
            100% { transform: scale(1); opacity: 1; } 
        }
        .animate-pop { animation: popIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased min-h-screen">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl relative z-0">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Client Portal</h1>
                
            </div>

            <div id="login-notification" class="hidden mb-4 p-3 rounded-lg text-center font-bold text-sm"></div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Phone Number</label>
                    <input type="tel" id="login-phone" placeholder="01xxxxxxxx" maxlength="12"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition font-semibold" autocomplete="tel">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                    <input type="password" id="login-password" placeholder="Password" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" autocomplete="current-password">
                </div>
                
                <button type="submit" id="btn-login" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 active:scale-95 transition shadow-lg">
                    CLIENT LOGIN
                </button>
            </form>
        </div>
    </div>

    <!-- ORDER SCREEN -->
    <div id="order-screen" class="hidden min-h-screen pb-20">
        <header class="bg-white shadow-md sticky top-0 z-10 safe-top">
            <div class="max-w-3xl mx-auto px-4">
                <div class="flex justify-between items-center py-4">
                    <div class="flex flex-col">
                        <h1 class="text-xl font-bold text-gray-900 tracking-tight">Submit Order</h1>
                        <div id="header-today-date" class="text-xs font-bold text-gray-500 uppercase tracking-wider mt-1"></div>
                    </div>
                    <button id="btn-logout" style="background-color: #7FFFD4 !important; color: #111827 !important;" class="font-bold hover:opacity-80 text-sm px-3 py-1 rounded-lg">Logout</button>
                </div>
            </div>
        </header>

        <main class="max-w-3xl mx-auto py-6 px-4">
            <div id="order-notification" class="hidden mb-4"></div>

            <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6 shadow-sm">
                <p class="text-xs text-blue-600 font-bold uppercase tracking-wider mb-1">Authenticated As:</p>
                <div id="display-company-name" class="text-2xl font-bold text-gray-900">Loading...</div>
            </div>

            <form id="order-form" class="space-y-6">
                
                <!-- Date Selection -->
                <div class="bg-white rounded-xl shadow-md p-5 border border-gray-200">
                    <h3 class="font-bold text-gray-800 text-lg mb-3 flex items-center gap-2">Delivery Date</h3>
                    <input type="date" id="order-date" required class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none text-lg font-bold text-gray-700">
                </div>

                <!-- Broiler Section -->
                <div class="bg-white rounded-xl shadow-md p-5 border border-gray-200">
                    <h3 class="font-bold text-gray-800 text-lg mb-4 pb-2 border-b">Broiler & Slices</h3>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Whole Chicken (Qty)</label>
                            <input type="number" id="broiler-qty" class="w-full border border-gray-300 rounded-lg p-3 text-center text-lg font-bold" min="0" placeholder="0">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Broiler Remark</label>
                            <input type="text" id="broiler-remark" class="w-full border border-gray-300 rounded-lg p-3 text-sm" placeholder="e.g. Size 1.8">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Slices / Potong (Qty)</label>
                            <input type="number" id="slices-qty" class="w-full border border-gray-300 rounded-lg p-3 text-center text-lg font-bold" min="0" placeholder="0">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Slices Remark</label>
                            <input type="text" id="slices-remark" class="w-full border border-gray-300 rounded-lg p-3 text-sm" placeholder="e.g. Potong 8">
                        </div>
                    </div>
                </div>

                <!-- Parts Section -->
                <div class="bg-white rounded-xl shadow-md p-5 border border-gray-200">
                    <h3 class="font-bold text-gray-800 text-lg mb-4 pb-2 border-b">Chicken Parts</h3>
                    
                    <div id="parts-list" class="space-y-3 mb-4">
                        <p class="text-gray-400 italic text-sm text-center py-2" id="empty-parts-msg">No parts added yet.</p>
                    </div>

                    <div class="bg-gray-50 rounded-lg p-4 border border-gray-200">
                        <div class="grid grid-cols-12 gap-2 mb-2">
                            <div class="col-span-12 sm:col-span-6">
                                <label class="block text-xs font-bold text-gray-500 mb-1">PART NAME</label>
                                <input type="text" id="part-name" class="w-full border border-gray-300 rounded p-2 text-sm" placeholder="e.g. Dada, Peha">
                            </div>
                            <div class="col-span-6 sm:col-span-3">
                                <label class="block text-xs font-bold text-gray-500 mb-1">QTY</label>
                                <input type="number" id="part-qty" class="w-full border border-gray-300 rounded p-2 text-sm" step="0.5" placeholder="0">
                            </div>
                            <div class="col-span-6 sm:col-span-3">
                                <label class="block text-xs font-bold text-gray-500 mb-1">UNIT</label>
                                <select id="part-unit" class="w-full border border-gray-300 rounded p-2 text-sm bg-white">
                                    <option value="KG">KG</option>
                                    <option value="BAG">BAG</option>
                                </select>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="part-remark" class="flex-1 border border-gray-300 rounded p-2 text-sm" placeholder="Remark (Optional)">
                            <button type="button" id="btn-add-part" class="bg-indigo-600 text-white font-bold px-4 rounded hover:bg-indigo-700 transition">Add Part</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-md p-5 border border-gray-200">
                     <h3 class="font-bold text-gray-800 text-lg mb-2">General Order Remark</h3>
                    <textarea id="general-remark" rows="2" class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Any special instructions for the whole order..."></textarea>
                </div>

                <button type="submit" id="btn-submit-order" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl transition shadow-lg text-lg flex justify-center items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Send Order to Admin
                </button>
            </form>
        </main>
    </div>

    <!-- Set Password Modal (First Time) -->
    <div id="modal-set-password" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 text-center animate-pop">
            <h2 class="text-xl font-bold text-gray-900 tracking-tight mb-2">First Time Login</h2>
            <p class="text-gray-600 mb-6 text-sm">Welcome! Please set a password to use for future logins.</p>
            
            <input type="password" id="new-password" placeholder="Create a new password" 
                class="w-full px-4 py-3 mb-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-left">
            
            <button id="btn-save-password" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-md">
                Save & Continue
            </button>
            <button onclick="document.getElementById('modal-set-password').classList.add('hidden')" class="w-full mt-3 text-gray-500 font-semibold hover:text-gray-700">Cancel</button>
        </div>
    </div>

    <!-- PWA Installation Guide -->
    <div id="pwa-guide" class="hidden fixed bottom-6 left-6 right-6 z-[60] animate-pop">
        <div class="bg-blue-600 text-white p-5 rounded-2xl shadow-2xl relative">
            <button onclick="document.getElementById('pwa-guide').classList.add('hidden')" class="absolute top-2 right-3 text-white opacity-60 hover:opacity-100 text-xl font-bold">&times;</button>
            <div class="flex items-center gap-4 mb-3">
                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-inner">
                    <img src="icons/icon-192.png" alt="App" class="w-10 h-10 rounded">
                </div>
                <div>
                    <h4 class="font-bold text-lg leading-tight">Install Ordering App</h4>
                    <p class="text-xs text-blue-100 italic">Fast orders, no web link needed!</p>
                </div>
            </div>
            <div id="pwa-instructions" class="text-sm font-semibold bg-blue-700 bg-opacity-40 p-3 rounded-xl border border-blue-400 border-opacity-30">
                <!-- Dynamic text based on OS -->
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQAKliT1QN8H-FOuNzvUGArbyQfM_U5MA",
            authDomain: "opf4896system.firebaseapp.com",
            projectId: "opf4896system",
            storageBucket: "opf4896system.firebasestorage.app",
            messagingSenderId: "150864121707",
            appId: "1:150864121707:web:b3161a86514c1d86dd062e"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        db.enablePersistence({ synchronizeTabs: true }).catch(err => console.log('Offline persistence error:', err.code));

        // State
        let currentParts = [];
        let loggedInCustomerName = null;
        let loggedInCustomerId = null;

        // Elements
        const loginScreen = document.getElementById('login-screen');
        const orderScreen = document.getElementById('order-screen');
        const setPasswordModal = document.getElementById('modal-set-password');
        
        // --- Date Setup ---
        const today = new Date();
        today.setDate(today.getDate() + 1); // Default to tomorrow
        const tomorrowStr = today.toISOString().split('T')[0];
        document.getElementById('order-date').value = tomorrowStr;
        document.getElementById('order-date').min = tomorrowStr; // Can't order for past

        // --- Notifications ---
        function showNotify(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = `mb-4 p-3 rounded-lg text-center font-bold text-sm ${type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'} animate-pop`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 4000);
        }

        // --- Helper: Normalize Phone ---
        function normalizePhone(nr) {
            let n = nr.replace(/\D/g, '');
            if (n.startsWith('60')) n = n.substring(1); // turn 601... to 01...
            if (n.startsWith('0')) return n;
            return '0' + n;
        }

        // --- Session check ---
        window.addEventListener('DOMContentLoaded', () => {
            const storedId = localStorage.getItem('client_id');
            const storedName = localStorage.getItem('client_name');
            if (storedId && storedName) {
                loggedInCustomerId = storedId;
                loggedInCustomerName = storedName;
                showOrderScreen();
            }
            setupPWAInstructions();
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log("SW Registered"))
                .catch(err => console.log("SW Failed", err));
        }

        function setupPWAInstructions() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            if (!isStandalone) {
                const guide = document.getElementById('pwa-guide');
                const text = document.getElementById('pwa-instructions');
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                const isAndroid = /Android/.test(navigator.userAgent);

                if (isIOS) {
                    text.innerHTML = 'Tap the <span class="bg-white text-blue-600 px-2 py-0.5 rounded mx-1">Share</span> icon (bottom center) and select <span class="bg-white text-blue-600 px-2 py-0.5 rounded mx-1">Add to Home Screen</span>.';
                    guide.classList.remove('hidden');
                } else if (isAndroid) {
                    text.innerHTML = 'Tap the <span class="bg-white text-blue-600 px-2 py-0.5 rounded mx-1">Menu</span> (3 dots) and select <span class="bg-white text-blue-600 px-2 py-0.5 rounded mx-1">Add to Home screen / Install</span>.';
                    guide.classList.remove('hidden');
                }
            }
        }

        function showOrderScreen() {
            loginScreen.classList.add('hidden');
            orderScreen.classList.remove('hidden');
            document.getElementById('display-company-name').textContent = loggedInCustomerName;
        }

        // --- Login Logic ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phoneInput = document.getElementById('login-phone').value.trim();
            const pwdInput = document.getElementById('login-password').value.trim();
            const btn = document.getElementById('btn-login');

            if (!phoneInput || !pwdInput) return showNotify('login-notification', 'Enter phone and password.', 'error');
            
            const normalized = normalizePhone(phoneInput);
            btn.textContent = "Verifying...";
            btn.disabled = true;

            try {
                // We check both "01..." and "601..." just in case
                const snapshot = await db.collection('customers')
                    .where('phone', 'in', [normalized, '6' + normalized])
                    .limit(1).get();

                if (snapshot.empty) throw new Error("Phone number not registered.");

                const doc = snapshot.docs[0];
                const data = doc.data();

                if (!data.portalPassword) {
                    // First time
                    loggedInCustomerId = doc.id;
                    loggedInCustomerName = data.displayName;
                    document.getElementById('new-password').value = pwdInput;
                    openModal('modal-set-password');
                } else if (data.portalPassword === pwdInput) {
                    // Success
                    loggedInCustomerId = doc.id;
                    loggedInCustomerName = data.displayName;
                    localStorage.setItem('client_id', loggedInCustomerId);
                    localStorage.setItem('client_name', loggedInCustomerName);
                    showOrderScreen();
                } else {
                    throw new Error("Incorrect password.");
                }
            } catch(e) {
                showNotify('login-notification', e.message, 'error');
            } finally {
                btn.textContent = "CLIENT LOGIN";
                btn.disabled = false;
            }
        });

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // --- Set Password Logic ---
        document.getElementById('btn-save-password').addEventListener('click', async () => {
            const newPwd = document.getElementById('new-password').value.trim();
            if (!newPwd) return alert("Password required.");
            const btn = document.getElementById('btn-save-password');
            btn.disabled = true; btn.textContent = "Saving...";
            try {
                await db.collection('customers').doc(loggedInCustomerId).update({
                    portalPassword: newPwd
                });
                closeModal('modal-set-password');
                localStorage.setItem('client_id', loggedInCustomerId);
                localStorage.setItem('client_name', loggedInCustomerName);
                showOrderScreen();
            } catch(e) {
                alert("Error setting password.");
            } finally {
                btn.disabled = false; btn.textContent = "Save & Continue";
            }
        });

        // --- Logout ---
        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('client_id');
            localStorage.removeItem('client_name');
            window.location.reload();
        });

        // --- Parts Management ---
        function renderParts() {
            const list = document.getElementById('parts-list');
            const empty = document.getElementById('empty-parts-msg');
            
            if (currentParts.length === 0) {
                list.innerHTML = '';
                list.appendChild(empty);
                empty.classList.remove('hidden');
                return;
            }
            
            empty.classList.add('hidden');
            let html = '';
            currentParts.forEach((p, i) => {
                html += `
                    <div class="flex justify-between items-center bg-white border rounded p-2 text-sm shadow-sm">
                        <div>
                            <span class="font-bold text-gray-800">${p.name}</span> 
                            <span class="text-blue-600 font-semibold mx-1">(${p.qty} ${p.unit})</span>
                            ${p.remark ? `<br><span class="text-gray-500 italic text-xs">${p.remark}</span>` : ''}
                        </div>
                        <button type="button" onclick="removePart(${i})" class="text-red-500 font-bold hover:bg-red-50 px-2 py-1 rounded">&times;</button>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        document.getElementById('btn-add-part').addEventListener('click', () => {
            const name = document.getElementById('part-name').value.trim();
            const qty = parseFloat(document.getElementById('part-qty').value);
            const unit = document.getElementById('part-unit').value;
            const remark = document.getElementById('part-remark').value.trim();

            if(!name || isNaN(qty) || qty <= 0) return alert("Valid Part Name and Quantity required.");

            currentParts.push({ name, qty, unit, remark });
            renderParts();

            document.getElementById('part-name').value = '';
            document.getElementById('part-qty').value = '';
            document.getElementById('part-remark').value = '';
        });

        window.removePart = (index) => {
            currentParts.splice(index, 1);
            renderParts();
        };

        // --- Submit Order ---
        document.getElementById('order-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const selectedDate = document.getElementById('order-date').value;
            if(!selectedDate) return alert("Delivery Date required.");

            const wholeQty = parseInt(document.getElementById('broiler-qty').value) || 0;
            const wholeRemark = document.getElementById('broiler-remark').value.trim();
            const slicesQty = parseInt(document.getElementById('slices-qty').value) || 0;
            const slicesRemark = document.getElementById('slices-remark').value.trim();
            const generalRemark = document.getElementById('general-remark').value.trim();

            let pendingOrders = [];
            let broilerItems = [];
            
            if (wholeQty > 0) broilerItems.push({ description: 'Broiler', qty: wholeQty, remark: wholeRemark });
            if (slicesQty > 0) broilerItems.push({ description: 'Slices', qty: slicesQty, remark: slicesRemark });

            // Create Broiler Doc if needed
            if(broilerItems.length > 0) {
                pendingOrders.push({
                    customerName: loggedInCustomerName, 
                    customerRemark: generalRemark,
                    productType: 'broiler', 
                    status: 'unapproved', 
                    source: 'b2b_portal', // To differentiate
                    deliveryDate: selectedDate,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    broilers: broilerItems, 
                    processedText: broilerItems.map(b => `${b.qty} ${b.description}`).join(', ')
                });
            }

            // Create Parts Doc if needed
            if(currentParts.length > 0) {
                pendingOrders.push({
                    customerName: loggedInCustomerName, 
                    customerRemark: generalRemark,
                    productType: 'parts', 
                    status: 'unapproved', 
                    source: 'b2b_portal',
                    deliveryDate: selectedDate,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    parts: currentParts, 
                    processedText: `${loggedInCustomerName} Parts Order`
                });
            }

            if(pendingOrders.length === 0) return alert("Order is empty. Please add items.");

            const btn = document.getElementById('btn-submit-order');
            btn.disabled = true; btn.textContent = "Sending...";

            try {
                await Promise.all(pendingOrders.map(o => db.collection('orders').add(o)));
                showNotify('order-notification', 'Your order requires admin approval. Submitted successfully!', 'success');
                
                // Clear form
                document.getElementById('order-form').reset();
                currentParts = [];
                renderParts();
                document.getElementById('order-date').value = tomorrowStr;
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch(error) {
                console.error(error);
                showNotify('order-notification', 'Error saving order.', 'error');
            } finally {
                btn.disabled = false; 
                btn.innerHTML = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Send Order to Admin`;
            }
        });
        function updateHeaderDate() {
            const dateEl = document.getElementById('header-today-date');
            if (dateEl) {
                const now = new Date();
                const d = String(now.getDate()).padStart(2, '0');
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const y = now.getFullYear();
                dateEl.textContent = `${d}/${m}/${y}`;
            }
        }
        document.addEventListener('DOMContentLoaded', updateHeaderDate);
    </script>
</body>
</html>
