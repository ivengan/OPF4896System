<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System & Settings - Multi-Function System</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png">
    <style>
        :root {
            --bg-app: #f4f4f5;
            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --text-main: #18181b;
            --text-muted: #52525b;
            --primary: #27272a;
            --primary-hover: #3f3f46;
            --danger: #991b1b;
            --danger-muted: #fef2f2;
            --border: #e4e4e7;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        *, ::after, ::before { box-sizing: border-box; }
        html { line-height: 1.5; -webkit-text-size-adjust: 100%; }
        body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: var(--bg-app); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        button { cursor: pointer; appearance: none; transition: all 0.2s ease; }
        a { text-decoration: none; }

        .header { 
            background: var(--bg-header); 
            padding: 0.75rem 1.25rem; 
            box-shadow: var(--shadow);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 10;
        }
        
        .title { font-size: 1.1rem; font-weight: 800; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.05em; }
        
        .header-actions { display: flex; gap: 0.75rem; align-items: center; }

        .nav-btn {
            background: var(--primary); 
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .nav-btn:hover { background: var(--primary-hover); }

        .logout-btn { 
            background: transparent; 
            color: var(--danger); 
            border: 1px solid var(--danger);
            padding: 0.4rem 0.8rem; 
            border-radius: 0.375rem; 
            font-weight: 700; 
            font-size: 0.8rem; 
        }
        .logout-btn:hover { background: var(--danger-muted); }
        
        .main-container { 
            flex: 1; 
            padding: 1.5rem; 
            max-width: 32rem; 
            margin: 0 auto; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }

        .menu-btn { 
            display: flex; 
            align-items: center; 
            padding: 1.25rem; 
            border-radius: 0.75rem; 
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main); 
            font-weight: 700; 
            font-size: 1rem; 
            box-shadow: var(--shadow);
            text-decoration: none; 
            width: 100%;
        }
        .menu-btn:active { transform: scale(0.98); background: var(--bg-app); }
        .menu-btn span { margin-left: 1rem; flex: 1; }
        .menu-btn svg { width: 1.5rem; height: 1.5rem; flex-shrink: 0; color: var(--text-muted); }

        /* Modernized Menu Buttons (Monochromatic) */
        .btn-staff, .btn-setting, .btn-ai {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
        }
        .btn-staff:hover, .btn-setting:hover, .btn-ai:hover {
            border-color: var(--primary);
        }
        
            .whitespace-nowrap { white-space: nowrap; }
        .inline-flex { display: inline-flex; }
        .min-h-16 { min-height: 4rem; }
            .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
    </style>
</head>
<body>

    <script>
        const loginExpiry = localStorage.getItem('loginExpiry');
        if (!loginExpiry || Date.now() >= parseInt(loginExpiry)) {
            localStorage.removeItem('loginExpiry');
            localStorage.removeItem('user_phone');
            window.location.href = 'index.html';
        }
    </script>

    <div class="header" style="position: relative;">
        <div class="title">System Menu</div>
        <div id="header-today-date" class="font-bold text-gray-800" style="position: absolute; left: 50%; transform: translateX(-50%); font-size: 1.1rem;"></div>
        <div class="header-actions">
            <!-- Navigate back to Admin Panel (dashboard2) by default, or could be Main Board (dashboard) -->
            <button class="nav-btn" onclick="window.location.href='dashboard2.html'">TO ADMIN PANEL</button>
            <button id="logout-btn" class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main-container">
        <div class="menu-grid">
            
            <a href="ai_library.html" class="menu-btn btn-library">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                <span>AI Library</span>
                <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="staff_management.html" class="menu-btn btn-staff">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span>Staff Management</span>
                <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="setting.html" class="menu-btn btn-setting">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span>Setting</span>
                <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

        </div>
    </div>

    <script>
        function updateHeaderDate() {
            const dateEl = document.getElementById('header-today-date');
            if (dateEl) {
                const now = new Date();
                const d = String(now.getDate()).padStart(2, '0');
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const y = now.getFullYear();
                dateEl.textContent = `${d}/${m}/${y}`;
            }
        }
        document.addEventListener('DOMContentLoaded', updateHeaderDate);

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('loginExpiry');
            localStorage.removeItem('user_phone');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
